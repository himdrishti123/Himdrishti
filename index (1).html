        function CurrentAffairView({ 
            affair, articles = [], currentAffairs = [], answerWriting = [], testSeries = [], 
            onBack, onArticleSelect, onCurrentAffairSelect, onAnswerWritingSelect, onSeriesSelect, 
            user, onSignIn 
        }) {
            const [showComments, setShowComments] = useState(false);
            const [commentText, setCommentText] = useState('');
            const [comments, setComments] = useState([]);
            const [submitting, setSubmitting] = useState(false);
            const commentSectionRef = React.useRef(null);

            useContentInterest('currentAffairs', affair?.id, user);

            useEffect(() => {
                if (window.firebaseDB && affair.id) {
                    const { db, collection, onSnapshot, query, orderBy, doc: fbDoc, updateDoc, increment } = window.firebaseDB;
                    if (updateDoc && increment) {
                        updateDoc(fbDoc(db, "currentAffairs", affair.id), { views: increment(1) }).catch(e => console.error(e));
                    }
                    const commentsRef = collection(fbDoc(collection(db, 'currentAffairs'), affair.id), 'comments');
                    const q = query(commentsRef, orderBy('createdAt', 'desc'));
                    return onSnapshot(q, (snapshot) => {
                        setComments(snapshot.docs.map(doc => ({
                            id: doc.id,
                            ...doc.data(),
                            time: doc.data().createdAt?.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) || 'Just now'
                        })));
                    });
                }
            }, [affair.id]);

            const handleSubmitComment = async () => {
                if (!commentText.trim() || !user || !window.firebaseDB) return;
                setSubmitting(true);
                try {
                    const { db, collection, addDoc, serverTimestamp, doc: fbDoc } = window.firebaseDB;
                    const commentsRef = collection(fbDoc(collection(db, 'currentAffairs'), affair.id), 'comments');
                    await addDoc(commentsRef, {
                        text: commentText.trim(),
                        userName: user.displayName || 'User',
                        userPhoto: user.photoURL || null,
                        userEmail: user.email,
                        createdAt: serverTimestamp()
                    });
                    setCommentText('');
                } catch (err) { console.error(err); }
                setSubmitting(false);
            };

            const [copied, setCopied] = useState(false);
            const handleShare = () => {
                const url = `${window.location.origin}${window.location.pathname}?affair=${affair.id}`;
                navigator.clipboard.writeText(url).then(() => {
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2500);
                });
            };

            const handleContentClick = (e) => {
                const link = e.target.closest('.article-link');
                if (link) {
                    e.preventDefault();
                    const type = link.dataset.type || 'article';
                    const id = link.dataset.id || link.dataset.articleId;

                    if (type === 'article') {
                        const found = articles.find(a => a.id === id);
                        if (found) onArticleSelect(found);
                    } else if (type === 'current-affair') {
                        const found = currentAffairs.find(a => a.id === id);
                        if (found) onCurrentAffairSelect(found);
                    } else if (type === 'answer-writing') {
                        const found = answerWriting.find(a => a.id === id);
                        if (found) onAnswerWritingSelect(found);
                    } else if (type === 'test-series') {
                        const found = testSeries.find(a => a.id === id);
                        if (found) onSeriesSelect(found);
                    }
                }
            };

            return (
                <div onClick={handleContentClick} className="center-content" style={{ padding: '40px', maxWidth: '800px', margin: '0 auto', overflowY: 'auto', display: 'block' }}>
                    <button
                        onClick={onBack}
                        className="cta-btn cta-secondary"
                        style={{ marginBottom: '20px', display: 'flex', alignItems: 'center', gap: '8px' }}
                    >
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                            <path d="M19 12H5M12 19l-7-7 7-7" />
                        </svg>
                        Back to Current Affairs
                    </button>

                    <div style={{ display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '24px' }}>
                        <span style={{
                            fontSize: '12px', fontWeight: 600, padding: '4px 12px',
                            borderRadius: '6px', background: `#2563eb20`, color: '#2563eb',
                            textTransform: 'uppercase', letterSpacing: '0.5px',
                        }}>
                            {affair.category}
                        </span>
                        <span style={{ fontSize: '12px', color: '#6b7280' }}>{new Date(affair.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</span>
                        <span style={{ fontSize: '12px', color: '#6b7280' }}>5 min read</span>
                    </div>

                    <h1 style={{ fontSize: '32px', fontWeight: '800', color: '#1f2937', marginBottom: '20px', lineHeight: '1.2' }}>
                        {affair.heading}
                    </h1>

                    <div style={{ fontSize: '16px', lineHeight: '1.7', color: '#4b5563', marginBottom: '20px' }}>
                        {/* Summary Block */}
                        {affair.description && (
                            <p style={{ marginBottom: '20px', fontWeight: '600', color: '#374151' }}>{affair.description}</p>
                        )}

                        {/* Content Blocks */}
                        {affair.content && affair.content.map((item, idx) => {
                            if (item.type === 'paragraph') {
                                return <p key={idx} style={{ marginBottom: '16px' }} dangerouslySetInnerHTML={{ __html: item.value }} />;
                            }
                            if (item.type === 'image' && item.value) {
                                return <img key={idx} src={item.value} style={{ width: '100%', borderRadius: '16px', marginBottom: '24px' }} alt="News Media" />;
                            }
                            if (item.type === 'video' && item.value) {
                                const ytMatch = item.value.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([\w-]{11})/);
                                if (ytMatch) {
                                    return (
                                        <div key={idx} style={{ position: 'relative', width: '100%', paddingBottom: '56.25%', height: 0, borderRadius: '16px', overflow: 'hidden', marginBottom: '24px', background: '#000' }}>
                                            <iframe src={`https://www.youtube.com/embed/${ytMatch[1]}?rel=0`} frameBorder="0" allowFullScreen style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%' }} />
                                        </div>
                                    );
                                }
                            }
                            if (item.type === 'download' && item.value) {
                                return (
                                    <div key={idx} style={{ textAlign: 'center', margin: '24px 0', padding: '24px', background: 'rgba(37, 99, 235, 0.04)', borderRadius: '16px', border: '1px dashed rgba(37, 99, 235, 0.3)' }}>
                                        <h4 style={{ fontSize: '17px', fontWeight: '700', color: '#1f2937', marginBottom: '12px' }}>{item.label || 'Attached Resource'}</h4>
                                        <button className="cta-btn cta-primary" onClick={() => window.open(item.value, '_blank')} style={{ padding: '10px 28px', fontSize: '14px', borderRadius: '50px' }}>
                                            Download
                                        </button>
                                    </div>
                                );
                            }
                            return null;
                        })}
                    </div>

                    {/* Comment & Share Buttons */}
                    <div style={{ display: 'flex', gap: '12px', marginTop: '32px', alignItems: 'center', flexWrap: 'wrap' }}>
                        <button className="cta-btn cta-primary" onClick={() => setShowComments(!showComments)} style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                            </svg>
                            Comment {comments.length > 0 && `(${comments.length})`}
                        </button>
                        <button className="cta-btn cta-secondary" onClick={handleShare} style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                <circle cx="18" cy="5" r="3" />
                                <circle cx="6" cy="12" r="3" />
                                <circle cx="18" cy="19" r="3" />
                                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
                                <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
                            </svg>
                            {copied ? '✓ Link Copied!' : 'Share'}
                        </button>
                        {copied && (
                            <span style={{ fontSize: '12px', color: '#10b981', fontWeight: 600 }}>
                                Update link copied to clipboard!
                            </span>
                        )}
                    </div>

                    {/* Comment Section */}
                    {showComments && (
                        <div className="comment-section" ref={commentSectionRef}>
                            <div className="comment-section-header">
                                <h3>Comments</h3>
                                <span className="comment-count-badge">{comments.length}</span>
                            </div>

                            {/* Comment Input */}
                            {user ? (
                                <div className="comment-input-box">
                                    {user.photoURL ? (
                                        <img src={user.photoURL} alt="You" className="comment-avatar" />
                                    ) : (
                                        <div className="comment-avatar-placeholder">{user.displayName ? user.displayName.charAt(0).toUpperCase() : 'U'}</div>
                                    )}
                                    <div className="comment-input-wrapper">
                                        <textarea
                                            className="comment-textarea"
                                            placeholder="Write your comment..."
                                            value={commentText}
                                            onChange={(e) => setCommentText(e.target.value)}
                                            onKeyDown={(e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSubmitComment(); } }}
                                        />
                                        <button
                                            className="comment-submit-btn"
                                            onClick={handleSubmitComment}
                                            disabled={!commentText.trim() || submitting}
                                        >
                                            {submitting ? 'Posting...' : 'Post Comment'}
                                        </button>
                                    </div>
                                </div>
                            ) : (
                                <div className="comment-login-prompt">
                                    <p>Sign in to join the conversation</p>
                                    <button className="comment-login-btn" onClick={onSignIn}>Sign In with Google</button>
                                </div>
                            )}

                            {/* Comment List */}
                            <div className="comment-list">
                                {comments.length === 0 ? (
                                    <div className="comment-empty">
                                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                                        </svg>
                                        <p>No comments yet. Be the first to share your thoughts!</p>
                                    </div>
                                ) : (
                                    comments.map(c => (
                                        <div key={c.id} className="comment-item">
                                            {c.userPhoto ? (
                                                <img src={c.userPhoto} alt={c.userName} className="comment-avatar" />
                                            ) : (
                                                <div className="comment-avatar-placeholder">
                                                    {c.userName ? c.userName.charAt(0).toUpperCase() : 'U'}
                                                </div>
                                            )}
                                            <div className="comment-body">
                                                <div className="comment-meta">
                                                    <span className="comment-author">{c.userName}</span>
                                                    <span className="comment-time">{c.time}</span>
                                                </div>
                                                <div className="comment-text">{c.text}</div>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function ArticlesPage({ articles = [], onArticleSelect, filteredCategory, onBack }) {
            return (
                <div className="center-content" style={{ padding: '30px', overflowY: 'auto', alignItems: 'flex-start', justifyContent: 'flex-start' }}>

                        >
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                <path d="M19 12H5M12 19l-7-7 7-7" />
                            </svg>
                            Back to Home
                        </button>
                        <div style={{ marginBottom: '32px' }}>

                                >
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '16px' }}>
                                        <span style={{
                                            fontSize: '12px', fontWeight: 600, padding: '4px 10px',
                                            borderRadius: '6px', background: `${article.color}15`, color: article.color,

                                    </div>

                                    <h2 style={{
                                        fontSize: '20px',
                                        fontWeight: '700',
                                        color: '#1f2937',
                                        marginBottom: '16px',
                                        lineHeight: '1.3'
                                    }}>
                                        {article.title}
                                    </h2>

                                        {(() => {
                                            const firstPara = article.content?.find(c => typeof c === 'string' || c.type === 'paragraph');

                                            return null;
                                        })()}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function PrivacyPolicyPage({ onBack }) {
            return (
                <div className="center-content" style={{ padding: '40px', overflowY: 'auto', alignItems: 'center' }}>
                    <div style={{ maxWidth: '800px', width: '100%', margin: '0 auto' }}>
                        <button
                            onClick={onBack}
                            className="cta-btn cta-secondary"
                            style={{ marginBottom: '20px', display: 'flex', alignItems: 'center', gap: '8px' }}
                        >
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                <path d="M19 12H5M12 19l-7-7 7-7" />
                            </svg>
                            Back to Home
                        </button>
                    <div style={{ background: 'white', borderRadius: '24px', padding: '40px', border: '1px solid #e5e7eb', boxShadow: '0 10px 25px rgba(0,0,0,0.05)' }}>
                        <div style={{ marginBottom: '32px' }}>
                            <h1 style={{ fontSize: '32px', fontWeight: '800', color: '#1f2937' }}>Privacy Policy – Himdrishti</h1>
                            <p style={{ color: '#6b7280', marginTop: '8px' }}>Last Updated: May 2026</p>
                            <div style={{ width: '40px', height: '4px', background: '#3b82f6', margin: '16px 0', borderRadius: '2px' }}></div>
                        </div>

                        <div style={{ fontSize: '15px', lineHeight: '1.8', color: '#4b5563', display: 'flex', flexDirection: 'column', gap: '20px' }}>
                            <p>Welcome to Himdrishti. Your privacy is important to us. This Privacy Policy explains how Himdrishti collects, uses, and protects user information when accessing our website and services.</p>
                            
                            <div>
                                <h3 style={{ color: '#1f2937', fontWeight: '700', marginBottom: '8px', fontSize: '18px' }}>1. Information We Collect</h3>
                                <p>We may collect the following information from users:</p>
                                <ul style={{ paddingLeft: '20px', margin: '8px 0' }}>

                                    <li>Email address</li>

                                <button

                </div>
            );
        }

                                fontWeight: 700,
                                cursor: 'pointer',
                                marginBottom: '20px',
                                fontSize: '14px'
                            }}
                        >
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                            Back to Home
                        </button>
                        <div style={{ marginBottom: '40px', textAlign: 'center' }}>
                            <div style={{
                                width: '70px',
                                height: '70px',
                                background: '#eff6ff',
                                borderRadius: '22px',
                                display: 'flex',
                                alignItems: 'center',
                                justifyContent: 'center',
                                margin: '0 auto 20px',
                                boxShadow: '0 10px 25px rgba(37, 99, 235, 0.08)'
                            }}>
                                <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#2563eb" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" /><rect x="8" y="2" width="8" height="4" rx="1" ry="1" /></svg>
                            </div>
                            <h1 style={{ fontSize: '28px', fontWeight: '800', color: '#1f2937', lineHeight: 1.25 }}>{pageTitle}</h1>
                            <p style={{ color: '#6b7280', marginTop: '12px', fontSize: '16px', lineHeight: '1.6', maxWidth: '640px', margin: '12px auto 0' }}>
                                {pageSubtitle}
                            </p>
                        </div>

                        {/* Filter Buttons */}
                        <div style={{ display: 'flex', gap: '10px', marginBottom: '30px', flexWrap: 'wrap', justifyContent: 'center' }}>
                            {filters.map(f => (
                                <button
                                    key={f}
                                    onClick={() => setFilter(f)}
                                    className="cta-btn"
                                    style={{
                                        padding: '10px 24px',
                                        fontSize: '13px',
                                        fontWeight: '700',
                                        borderRadius: '50px',
                                        background: filter === f ? '#2563eb' : 'rgba(37, 99, 235, 0.05)',
                                        color: filter === f ? 'white' : '#2563eb',
                                        border: '1px solid',
                                        borderColor: filter === f ? '#2563eb' : 'rgba(37, 99, 235, 0.1)',
                                        transition: 'all 0.3s ease'
                                    }}
                                >
                                    {f === 'All' ? 'All Series' : f + ' Tests'}
                                </button>
                            ))}
                        </div>

                        <div style={{
                            display: 'grid',
                            gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))',
                            gap: '16px',
                            width: '100%',
                            marginTop: '20px'
                        }}>
                            {filtered.length > 0 ? filtered.map((ts, i) => (
                                <button
                                    key={i}
                                    className="cta-btn"
                                    style={{
                                        width: '100%',
                                        padding: '20px 24px',
                                        textAlign: 'center',
                                        fontSize: '15px',
                                        fontWeight: '700',
                                        borderRadius: '16px',
                                        display: 'flex',
                                        flexDirection: 'column',
                                        alignItems: 'center',
                                        justifyContent: 'center',
                                        gap: '12px',
                                        border: '1px solid rgba(37, 99, 235, 0.2)',
                                        background: 'rgba(37, 99, 235, 0.04)',
                                        backdropFilter: 'blur(8px)',
                                        color: '#1e40af',
                                        transition: 'all 0.4s cubic-bezier(0.4, 0, 0.2, 1)',
                                        boxShadow: '0 4px 20px rgba(37, 99, 235, 0.05)',
                                        cursor: 'pointer'
                                    }}
                                    onClick={() => onSeriesSelect(ts)}
                                    onMouseEnter={e => {
                                        e.currentTarget.style.background = 'rgba(37, 99, 235, 0.1)';
                                        e.currentTarget.style.transform = 'translateY(-4px)';
                                        e.currentTarget.style.boxShadow = '0 12px 30px rgba(37, 99, 235, 0.15)';
                                        e.currentTarget.style.borderColor = 'rgba(37, 99, 235, 0.5)';
                                    }}
                                    onMouseLeave={e => {
                                        e.currentTarget.style.background = 'rgba(37, 99, 235, 0.04)';
                                        e.currentTarget.style.transform = 'translateY(0)';
                                        e.currentTarget.style.boxShadow = '0 4px 20px rgba(37, 99, 235, 0.05)';
                                        e.currentTarget.style.borderColor = 'rgba(37, 99, 235, 0.2)';
                                    }}
                                >
                                    <div style={{ background: 'rgba(37, 99, 235, 0.1)', padding: '10px', borderRadius: '12px', marginBottom: '4px', position: 'relative' }}>
                                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ color: '#2563eb' }}><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" /><rect x="8" y="2" width="8" height="4" rx="1" ry="1" /></svg>
                                        {ts.type === 'paid' && (
                                            hasActivePurchase(userPurchases, ts.id) ? (
                                                <div style={{ position: 'absolute', top: '-8px', right: '-8px', background: '#10b981', color: 'white', fontSize: '9px', fontWeight: 800, padding: '2px 6px', borderRadius: '4px', border: '2px solid white' }}>PURCHASED</div>
                                            ) : (
                                                <div style={{ position: 'absolute', top: '-8px', right: '-8px', background: '#f59e0b', color: 'white', fontSize: '9px', fontWeight: 800, padding: '2px 6px', borderRadius: '4px', border: '2px solid white' }}>₹{ts.price}</div>
                                            )
                                        )}
                                    </div>
                                    <div style={{ display: 'flex', flexDirection: 'column', gap: '2px' }}>
                                        <span>{ts.title}</span>
                                        <span style={{ fontSize: '10px', color: hasActivePurchase(userPurchases, ts.id) ? '#10b981' : (ts.type === 'paid' ? '#f59e0b' : '#10b981'), textTransform: 'uppercase', letterSpacing: '0.5px' }}>
                                            {hasActivePurchase(userPurchases, ts.id) ? 'Unlocked Access' : (ts.type === 'paid' ? 'Premium Series' : 'Free Access')}
                                        </span>
                                    </div>
                                </button>
                            )) : (
                                <div style={{ gridColumn: '1/-1', textAlign: 'center', padding: '40px', color: '#6b7280' }}>No test series available for this filter.</div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function TestSeriesDetailView({ 
            series, articles = [], onAttemptQuiz, currentAffairs = [], answerWriting = [], testSeries = [], 
            onBack, onArticleSelect, onCurrentAffairSelect, onAnswerWritingSelect, onSeriesSelect, userResults, testSeriesMode = 'online', collectionName = 'testSeries', user
        }) {
            const [quizAnswers, setQuizAnswers] = useState({});
            const [submittedTests, setSubmittedTests] = useState({});
            const [testResult, setTestResult] = useState(null);
            const [lastResults, setLastResults] = useState({});

            useContentInterest(collectionName, series?.id, user);

            // Load saved quiz test states from localStorage whenever series changes and track view
            useEffect(() => {
                if (series && series.id && window.firebaseDB) {
                    const { db, doc, updateDoc, increment } = window.firebaseDB;
                    if (updateDoc && increment) {
                        updateDoc(doc(db, collectionName, series.id), { views: increment(1) }).catch(e => console.error(e));
                    }
                }

                setQuizAnswers({});
                setSubmittedTests({});
                setLastResults({});
                setTestResult(null);

                if (series && series.id && series.content) {
                    const loadedAnswers = {};
                    const loadedSubmitted = {};
                    const loadedResults = {};
                    let hasSaved = false;

                    series.content.forEach((item, idx) => {
                        if (item.type === 'quiz_test') {
                            const saved = localStorage.getItem(`himdrishti_quiz_test_${series.id}_${idx}`);
                            if (saved) {
                                try {
                                    const data = JSON.parse(saved);
                                    loadedSubmitted[idx] = true;
                                    loadedResults[idx] = data.result;
                                    if (data.answers) {
                                        Object.keys(data.answers).forEach(k => {
                                            loadedAnswers[k] = data.answers[k];
                                        });
                                    }
                                    hasSaved = true;
                                } catch (e) {
                                    console.error("Error parsing saved quiz test state", e);
                                }
                            }
                        }
                    });

                    if (hasSaved) {
                        setQuizAnswers(loadedAnswers);
                        setSubmittedTests(loadedSubmitted);
                        setLastResults(loadedResults);
                    }
                }
            }, [series.id]);

            const handleContentClick = (e) => {
                const link = e.target.closest('.article-link');
                if (link) {
                    e.preventDefault();
                    const type = link.dataset.type || 'article';
                    const id = link.dataset.id || link.dataset.articleId;

                    if (type === 'article') {
                        const found = articles.find(a => a.id === id);
                        if (found) onArticleSelect(found);
                    } else if (type === 'current-affair') {
                        const found = currentAffairs.find(a => a.id === id);
                        if (found) onCurrentAffairSelect(found);
                    } else if (type === 'answer-writing') {
                        const found = answerWriting.find(a => a.id === id);
                        if (found) onAnswerWritingSelect(found);
                    } else if (type === 'test-series') {
                        const found = testSeries.find(a => a.id === id);
                        if (found) onSeriesSelect(found);
                    }
                }
            };

            return (
                <div onClick={handleContentClick} className="center-content" style={{ padding: '30px', overflowY: 'auto', paddingTop: '120px' }}>
                    <div style={{ maxWidth: '850px', width: '100%', margin: '0 auto' }}>
                        {/* Static Back Button */}
                        <div style={{ marginBottom: '24px' }}>
                            <button
                                onClick={onBack}
                                style={{
                                    display: 'flex',
                                    alignItems: 'center',
                                    gap: '8px',
                                    background: '#eff6ff',
                                    border: '1px solid rgba(37,99,235,0.1)',
                                    color: '#2563eb',
                                    fontWeight: 700,
                                    cursor: 'pointer',
                                    padding: '8px 18px',
                                    borderRadius: '50px',
                                    fontSize: '13px',
                                    transition: 'all 0.3s ease'
                                }}
                                onMouseEnter={e => { e.currentTarget.style.background = '#dbeafe'; }}
                                onMouseLeave={e => { e.currentTarget.style.background = '#eff6ff'; }}
                            >
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                                Back
                            </button>
                        </div>

                        <div style={{ marginBottom: '40px' }}>
                            <h1 style={{ fontSize: '32px', fontWeight: '800', color: '#1f2937', marginBottom: '12px' }}>{series.title}</h1>
                            <p style={{ fontSize: '16px', color: '#6b7280' }}>{series.desc}</p>
                        </div>

                        <div className="series-content-flow" style={{ display: 'flex', flexDirection: 'column', gap: '30px', marginBottom: '40px' }}>
                            {(series.content || []).map((item, idx) => {
                                // Hide quiz_test blocks in offline mode
                                if (item.type === 'quiz_test' && testSeriesMode === 'offline') {
                                    return null;
                                }
                                if (item.type === 'paragraph') {
                                    return <div key={idx} className="article-paragraph" dangerouslySetInnerHTML={{ __html: item.value }} style={{ fontSize: '16px', lineHeight: '1.8', color: '#374151' }}></div>;
                                }
                                if (item.type === 'image' && item.value) {
                                    return (
                                        <div key={idx} style={{ borderRadius: '16px', overflow: 'hidden', boxShadow: '0 4px 15px rgba(0,0,0,0.05)' }}>
                                            <img src={item.value} alt={`Resource ${idx + 1}`} style={{ width: '100%', height: 'auto', display: 'block' }} />
                                        </div>
                                    );
                                }
                                if (item.type === 'video' && item.value) {
                                    const ytMatch = item.value.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([\w-]{11})/);
                                    if (ytMatch) {
                                        return (
                                            <div key={idx} style={{ position: 'relative', paddingBottom: '56.25%', height: 0, borderRadius: '16px', overflow: 'hidden', boxShadow: '0 4px 15px rgba(0,0,0,0.05)' }}>
                                                <iframe
                                                    style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%', border: 'none' }}
                                                    src={`https://www.youtube.com/embed/${ytMatch[1]}`}
                                                    allowFullScreen
                                                ></iframe>
                                            </div>
                                        );
                                    }
                                }
                                if (item.type === 'download' && item.value) {
                                    return (
                                        <div key={idx} style={{ textAlign: 'center', margin: '20px 0' }}>
                                            <h3 style={{ fontSize: '18px', fontWeight: '700', color: '#1f2937', marginBottom: '12px' }}>{item.label || 'Resource Available'}</h3>
                                            <button
                                                className="cta-btn cta-primary"
                                                style={{ padding: '10px 32px', fontSize: '14px', borderRadius: '50px' }}
                                                onClick={() => window.open(item.value, '_blank')}
                                            >
                                                Download Now
                                            </button>
                                        </div>
                                    );
                                }
                                if (item.type === 'quiz' && item.questions && item.questions.length > 0) {
                                    return (
                                        <div key={idx} style={{ 
                                            margin: '30px 0', 
                                            padding: '24px', 
                                            background: '#faf5ff', 
                                            borderRadius: '24px', 
                                            border: '1px solid #f3e8ff',
                                            boxShadow: '0 10px 30px rgba(107, 33, 168, 0.03)'
                                        }}>
                                            <div style={{ display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '20px' }}>
                                                <span style={{ 
                                                    fontSize: '20px', 
                                                    background: '#f3e8ff', 
                                                    color: '#6b21a8', 
                                                    width: '40px', 
                                                    height: '40px', 
                                                    borderRadius: '12px', 
                                                    display: 'flex', 
                                                    alignItems: 'center', 
                                                    justifyContent: 'center' 
                                                }}>
                                                    📝
                                                </span>
                                                <div>
                                                    <h4 style={{ fontSize: '18px', fontWeight: '800', color: '#581c87', margin: 0 }}>Interactive Quiz</h4>
                                                    <p style={{ fontSize: '12px', color: '#7e22ce', margin: 0 }}>Test your knowledge on the topic</p>
                                                </div>
                                            </div>
                                            
                                            <div style={{ display: 'flex', flexDirection: 'column', gap: '20px' }}>
                                                {item.questions.map((q, qIdx) => {
                                                    const answerKey = `${idx}-${qIdx}`;
                                                    const selectedOpt = quizAnswers[answerKey];
                                                    const isAnswered = selectedOpt !== undefined;
                                                    
                                                    return (
                                                        <div key={qIdx} style={{ 
                                                            background: '#ffffff', 
                                                            padding: '20px', 
                                                            borderRadius: '16px', 
                                                            border: '1px solid #f3e8ff' 
                                                        }}>
                                                            <div style={{ display: 'flex', gap: '8px', marginBottom: '14px' }}>
                                                                <span style={{ 
                                                                    background: '#f3e8ff', 
                                                                    color: '#6b21a8', 
                                                                    fontWeight: '800', 
                                                                    fontSize: '12px', 
                                                                    padding: '2px 8px', 
                                                                    borderRadius: '6px', 
                                                                    height: 'fit-content' 
                                                                }}>
                                                                    Q{qIdx + 1}
                                                                </span>
                                                                <h5 style={{ fontSize: '15px', fontWeight: '700', color: '#1f2937', margin: 0, lineHeight: '1.4' }}>
                                                                    {q.question}
                                                                </h5>
                                                            </div>
                                                            
                                                            <div style={{ display: 'flex', flexDirection: 'column', gap: '10px', marginBottom: isAnswered ? '16px' : 0 }}>
                                                                {['A', 'B', 'C', 'D'].map(opt => {
                                                                    const optText = q.options?.[opt];
                                                                    if (!optText) return null;
                                                                    
                                                                    const isSelected = selectedOpt === opt;
                                                                    const isCorrect = q.correctOption === opt;
                                                                    
                                                                    let optBg = '#ffffff';
                                                                    let optBorder = '#e2e8f0';
                                                                    let optColor = '#4b5563';
                                                                    let checkIcon = null;
                                                                    
                                                                    if (isAnswered) {
                                                                        if (isCorrect) {
                                                                            optBg = '#f0fdf4';
                                                                            optBorder = '#10b981';
                                                                            optColor = '#15803d';
                                                                            checkIcon = '✓';
                                                                        } else if (isSelected) {
                                                                            optBg = '#fef2f2';
                                                                            optBorder = '#ef4444';
                                                                            optColor = '#b91c1c';
                                                                            checkIcon = '✗';
                                                                        }
                                                                    }
                                                                    
                                                                    return (
                                                                        <button 
                                                                            key={opt}
                                                                            disabled={isAnswered}
                                                                            onClick={() => {
                                                                                setQuizAnswers(prev => ({ ...prev, [answerKey]: opt }));
                                                                            }}
                                                                            style={{ 
                                                                                display: 'flex', 
                                                                                alignItems: 'center', 
                                                                                width: '100%', 
                                                                                padding: '12px 16px', 
                                                                                borderRadius: '12px', 
                                                                                border: `1.5px solid ${optBorder}`, 
                                                                                background: optBg, 
                                                                                color: optColor, 
                                                                                fontSize: '14px', 
                                                                                fontWeight: '600', 
                                                                                textAlign: 'left', 
                                                                                cursor: isAnswered ? 'default' : 'pointer', 
                                                                                transition: 'all 0.2s ease',
                                                                                gap: '10px'
                                                                            }}
                                                                        >
                                                                            <span style={{ 
                                                                                width: '24px', 
                                                                                height: '24px', 
                                                                                borderRadius: '50%', 
                                                                                background: isAnswered ? (isCorrect ? '#10b981' : isSelected ? '#ef4444' : '#f1f5f9') : '#f1f5f9', 
                                                                                color: isAnswered ? '#ffffff' : '#6b7280', 
                                                                                display: 'flex', 
                                                                                alignItems: 'center', 
                                                                                justifyContent: 'center', 
                                                                                fontSize: '11px', 
                                                                                fontWeight: '700',
                                                                                flexShrink: 0
                                                                            }}>
                                                                                {checkIcon || opt}
                                                                            </span>
                                                                            <span style={{ flex: 1 }}>{optText}</span>
                                                                        </button>
                                                                    );
                                                                })}
                                                            </div>
                                                            
                                                            {isAnswered && q.explanation && (
                                                                <div style={{ 
                                                                    background: '#f8fafc', 
                                                                    padding: '14px 16px', 
                                                                    borderRadius: '12px', 
                                                                    borderLeft: '4px solid #6b21a8', 
                                                                    animation: 'fadeIn 0.3s ease' 
                                                                }}>
                                                                    <h6 style={{ fontSize: '12px', fontWeight: '700', color: '#581c87', margin: '0 0 4px 0' }}>Explanation:</h6>
                                                                    <p style={{ fontSize: '13px', color: '#475569', margin: 0, lineHeight: '1.5' }}>{q.explanation}</p>
                                                                </div>
                                                            )}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    );
                                }
                                if (item.type === 'quiz_test' && item.questions && item.questions.length > 0) {
                                    return (
                                        <div key={idx} style={{ 
                                            margin: '35px 0', 
                                            padding: '40px', 
                                            background: '#f0fdf4', 
                                            borderRadius: '24px', 
                                            border: '1px solid #d1fae5',
                                            boxShadow: '0 10px 30px rgba(4, 120, 87, 0.03)',
                                            display: 'flex',
                                            flexDirection: 'column',
                                            alignItems: 'center',
                                            justifyContent: 'center',
                                            gap: '24px'
                                        }}>
                                            <div style={{ display: 'flex', alignItems: 'center', gap: '15px' }}>
                                                <span style={{ 
                                                    fontSize: '32px', 
                                                    background: '#d1fae5', 
                                                    color: '#047857', 
                                                    width: '64px', 
                                                    height: '64px', 
                                                    borderRadius: '16px', 
                                                    display: 'flex', 
                                                    alignItems: 'center', 
                                                    justifyContent: 'center' 
                                                }}>
                                                    🏆
                                                </span>
                                                <div style={{ textAlign: 'center' }}>
                                                    <h4 style={{ fontSize: '24px', fontWeight: '800', color: '#064e3b', margin: '0 0 4px 0' }}>{item.name?.trim() || 'Quiz Test'}</h4>
                                                    <p style={{ fontSize: '14px', color: '#047857', margin: 0 }}>Test your preparation · {(item.questions || []).length} Questions</p>
                                                </div>
                                            </div>
                                            {(() => {
                                                const quizName = item.name?.trim() || 'Unnamed Quiz';
                                                const isTaken = userResults && userResults.some(r => r.quizName === quizName);
                                                return (
                                                    <button 
                                                        onClick={() => typeof onAttemptQuiz === 'function' && onAttemptQuiz(item)}
                                                        style={{ 
                                                            padding: '16px 48px', 
                                                            fontSize: '18px', 
                                                            fontWeight: '700',
                                                            borderRadius: '50px', 
                                                            background: isTaken ? '#3b82f6' : '#047857', 
                                                            color: '#ffffff',
                                                            border: 'none',
                                                            boxShadow: isTaken ? '0 4px 14px rgba(59, 130, 246, 0.3)' : '0 4px 14px rgba(4, 120, 87, 0.3)',
                                                            cursor: 'pointer',
                                                            transition: 'all 0.3s ease'
                                                        }}
                                                        onMouseEnter={e => e.currentTarget.style.transform = 'translateY(-2px)'}
                                                        onMouseLeave={e => e.currentTarget.style.transform = 'translateY(0)'}
                                                    >
                                                        {isTaken ? 'Result' : 'Attempt Test'}
                                                    </button>
                                                );
                                            })()}
                                        </div>
                                    );
                                }
                                return null;
                            })}
                        </div>
                    </div>
                    {testResult && (
                        <div className="modal-overlay" style={{ zIndex: 1000, display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'rgba(15, 23, 42, 0.6)', backdropFilter: 'blur(8px)', animation: 'fadeIn 0.25s ease-out' }}>
                            <div className="modal-content" style={{ 
                                maxWidth: '450px', 
                                width: '90%', 
                                background: '#ffffff', 
                                borderRadius: '28px', 
                                padding: '30px', 
                                boxShadow: '0 25px 50px -12px rgba(0, 0, 0, 0.15)',
                                border: '1px solid #f1f5f9',
                                textAlign: 'center',
                                position: 'relative',
                                animation: 'modalSlideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)'
                            }}>
                                <span style={{ fontSize: '64px', display: 'block', marginBottom: '15px' }}>
                                    {testResult.correct === testResult.total ? '🏆' : testResult.correct >= testResult.total / 2 ? '🎉' : '📚'}
                                </span>
                                <h3 style={{ fontSize: '24px', fontWeight: '800', color: '#1e293b', marginBottom: '10px', textTransform: 'none', background: 'none', webkitTextFillColor: 'initial' }}>
                                    {testResult.correct === testResult.total ? 'Perfect Score!' : testResult.correct >= testResult.total / 2 ? 'Great Job!' : 'Keep Learning!'}
                                </h3>
                                <p style={{ fontSize: '14px', color: '#64748b', marginBottom: '24px', lineHeight: '1.5' }}>
                                    You have successfully completed the quiz test. Here is a summary of your performance:
                                </p>
                                
                                <div style={{ 
                                    background: '#f8fafc', 
                                    borderRadius: '20px', 
                                    padding: '20px', 
                                    display: 'grid', 
                                    gridTemplateColumns: '1fr 1fr 1fr', 
                                    gap: '12px', 
                                    marginBottom: '26px' 
                                }}>
                                    <div style={{ padding: '8px' }}>
                                        <div style={{ fontSize: '22px', fontWeight: '800', color: '#10b981' }}>{testResult.correct}</div>

        function RightSidebarContent({ onArticleSelect, onViewAllClick, articles = [] }) {

        function RightSidebar({ onArticleSelect, onViewAllClick, articles }) {

                <div className="sidebar-right">
                    <RightSidebarContent onArticleSelect={onArticleSelect} onViewAllClick={onViewAllClick} articles={articles} />

        function QuizAttemptView({ quizData, onBack, user }) {
            const totalQuestions = quizData.questions ? quizData.questions.length : 0;
            const totalMarksSum = (quizData.questions || []).reduce((sum, q) => sum + (parseFloat(q.marks) || 1), 0);
            const totalNegativeSum = (quizData.questions || []).reduce((sum, q) => sum + (parseFloat(q.negativeMarks) || 0), 0);
            const allQCategories = Array.from(new Set((quizData.questions || []).map(q => q.category || 'General')));
            const categories = allQCategories;
            
            const [timeLeft, setTimeLeft] = useState(parseInt(quizData.time || 30) * 60);
            const [answers, setAnswers] = useState(quizData.savedResult?.userAnswers || {});
            const [markedForReview, setMarkedForReview] = useState({});
            const [currentQuestionIdx, setCurrentQuestionIdx] = useState(0);
            const [activeCategory, setActiveCategory] = useState(categories[0] || 'General');
            const [isSubmitted, setIsSubmitted] = useState(!!quizData.savedResult);
            const [resultData, setResultData] = useState(() => {
                if (quizData.savedResult && quizData.questions?.length) {
                    return {
                        ...quizData.savedResult,
                        ...calculateQuizScore(quizData.questions, quizData.savedResult.userAnswers || {}),
                        questions: quizData.questions,
                        userAnswers: quizData.savedResult.userAnswers || {}
                    };
                }
                return quizData.savedResult || null;
            });
            const [isExamineMode, setIsExamineMode] = useState(false);
            const [mobilePaletteOpen, setMobilePaletteOpen] = useState(false);
            const submitLockRef = useRef(false);

            const handleSubmit = () => {
                if (submitLockRef.current || isSubmitted) return;
                submitLockRef.current = true;

                const questions = quizData.questions || [];
                const calc = calculateQuizScore(questions, answers);
                const timeTakenSeconds = (parseInt(quizData.time || 30) * 60) - timeLeft;

                const newResult = {
                    userId: user?.uid,
                    quizName: quizData.name?.trim() || 'Unnamed Quiz',
                    timestamp: Date.now(),
                    timeTakenSeconds,
                    questions,
                    userAnswers: { ...answers },
                    ...calc
                };
                setResultData(newResult);
                setIsSubmitted(true);

                if (window.firebaseDB && user?.uid) {
                    const { db, collection, addDoc } = window.firebaseDB;
                    addDoc(collection(db, "quizResults"), newResult).catch(err => console.error(err));
                }
            };

            useEffect(() => {
                const timer = setInterval(() => {
                    setTimeLeft(prev => {
                        if (prev <= 1) {
                            clearInterval(timer);
                            return 0;
                        }
                        return prev - 1;
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                if (timeLeft <= 0 && !isSubmitted) {
                    handleSubmit();
                }
            }, [timeLeft, isSubmitted]);

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            };

            const filteredIndices = activeCategory === '__ALL__'
                ? (quizData.questions || []).map((_, i) => i)
                : (quizData.questions || [])
                    .map((q, i) => ({ q, i }))
                    .filter(({ q }) => (q.category || 'General') === activeCategory)
                    .map(({ i }) => i);




            const handleOptionSelect = (opt) => setAnswers(prev => ({ ...prev, [currentQuestionIdx]: opt }));
            const handleClearAnswer = () => setAnswers(prev => { const next = { ...prev }; delete next[currentQuestionIdx]; return next; });
            const handleMarkReview = () => setMarkedForReview(prev => ({ ...prev, [currentQuestionIdx]: !prev[currentQuestionIdx] }));
            
            const handleSaveNext = () => { 
                if (currentQuestionIdx < totalQuestions - 1) {
                    const nextIdx = currentQuestionIdx + 1;
                    setCurrentQuestionIdx(nextIdx);
                    const q = quizData.questions[nextIdx];
                    if (q && q.category) setActiveCategory(q.category);
                }
            };
            
            const handlePrev = () => { 
                if (currentQuestionIdx > 0) {
                    const prevIdx = currentQuestionIdx - 1;
                    setCurrentQuestionIdx(prevIdx);
                    const q = quizData.questions[prevIdx];
                    if (q && q.category) setActiveCategory(q.category);
                }
            };

            const currentQ = quizData.questions && quizData.questions[currentQuestionIdx];


            if (isExamineMode) {
                const examAnswers = resultData?.userAnswers || answers;
                return (
                    <div className="quiz-attempt-screen">
                        <div className="quiz-attempt-header">
                            <button onClick={() => setIsExamineMode(false)} style={{ display: 'flex', alignItems: 'center', gap: '6px', padding: '8px 16px', background: '#f1f5f9', border: '1px solid #e2e8f0', borderRadius: '8px', color: '#475569', fontWeight: '700', fontSize: '13px', cursor: 'pointer' }}>
                                ← Back to Result
                            </button>
                            <div>
                                <h2 style={{ margin: 0, fontSize: '18px', fontWeight: '800', color: '#1e293b' }}>🔍 Examine Test</h2>

                            </div>
                        </div>
                        <div className="quiz-examine-body">
                            <div style={{ maxWidth: '800px', margin: '0 auto', display: 'flex', flexDirection: 'column', gap: '24px' }}>
                                {(quizData.questions || []).map((q, idx) => {
                                    const userAns = examAnswers[idx];
                                    const isCorrect = userAns === q.correctOption;
                                    const isSkipped = userAns === undefined;
                                    return (
                                        <div key={idx} style={{ background: '#ffffff', borderRadius: '16px', padding: '24px', border: `2px solid ${isSkipped ? '#e2e8f0' : isCorrect ? '#10b981' : '#ef4444'}`, boxShadow: '0 4px 6px -1px rgba(0,0,0,0.04)' }}>
                                            {/* Status badge */}
                                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px', flexWrap: 'wrap', gap: '8px' }}>

                                                <div style={{ display: 'flex', alignItems: 'center', gap: '8px', flexWrap: 'wrap' }}>

                                                        {isSkipped ? '⏭ Skipped' : isCorrect ? '✅ Correct' : '❌ Wrong'}

                                            <p style={{ margin: '0 0 16px 0', fontSize: '16px', fontWeight: '700', color: '#1e293b', lineHeight: '1.6' }}>{q.questionText || q.question}</p>
                                            {/* Options */}
                                            <div style={{ display: 'flex', flexDirection: 'column', gap: '10px', marginBottom: '16px' }}>
                                                {['A', 'B', 'C', 'D'].map(opt => {
                                                    const optText = q[`option${opt}`];
                                                    if (!optText) return null;
                                                    const isUserPick = userAns === opt;
                                                    const isRight = q.correctOption === opt;
                                                    let bg = '#f8fafc', border = '1.5px solid #e2e8f0', color = '#334155';
                                                    if (isRight) { bg = '#dcfce7'; border = '2px solid #10b981'; color = '#065f46'; }

                                                            <span style={{ fontSize: '14px', fontWeight: isRight || isUserPick ? '700' : '500', color, flex: 1 }}>{optText}</span>
                                                            {isRight && <span style={{ fontSize: '18px' }}>✅</span>}
                                                            {isUserPick && !isRight && <span style={{ fontSize: '18px' }}>❌</span>}
                                                        </div>
                                                    );

                                            {/* Correct Answer note if wrong/skipped */}
                                            {!isCorrect && (
                                                <div style={{ padding: '10px 14px', background: '#f0fdf4', borderRadius: '8px', border: '1px solid #bbf7d0', marginBottom: q.explanation ? '12px' : 0 }}>

                                                </div>
                                            )}
                                            {/* Explanation */}

                                                </div>
                                            )}

                                    );
                                })}

                    </div>

                                    <h2 style={{ margin: 0, fontSize: '18px', fontWeight: '800', color: '#1e293b' }}>
                                        Hi {user ? (user.displayName || 'Guest User') : 'Guest User'} 👋
                                    </h2>
                                </div>
                            </div>
                            <div style={{ textAlign: 'right' }}>
                                <h3 style={{ margin: 0, fontSize: '14px', color: '#475569', fontWeight: '700' }}>My Overall Performance Summary</h3>
                                <p style={{ margin: 0, fontSize: '12px', color: '#64748b' }}>{quizData.name?.trim() || quizData.title || 'Quiz Test'}</p>
                            </div>
                        </div>

                        <div className="quiz-result-body">
                            <div className="quiz-result-inner">
                                <div className="quiz-result-top-grid">
                                    <div style={{ background: '#ffffff', padding: '24px', borderRadius: '16px', border: '1px solid #e2e8f0', boxShadow: '0 4px 6px -1px rgba(0,0,0,0.05)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: '12px' }}>
                                        <span style={{ fontSize: '32px' }}>🎯</span>
                                        <div style={{ textAlign: 'center' }}>
                                            <div style={{ fontSize: '14px', color: '#64748b', fontWeight: '700', textTransform: 'uppercase', letterSpacing: '1px' }}>Final Score</div>

                                            {(resultData.negativeDeducted > 0 || resultData.positiveGained > 0) && (
                                                <div style={{ fontSize: '12px', color: '#64748b', marginTop: '6px', lineHeight: 1.5 }}>

                                        <div style={{ color: '#475569', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '4px', fontWeight: '800', fontSize: '13px', textTransform: 'uppercase', letterSpacing: '0.5px' }}>
