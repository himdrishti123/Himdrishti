                    'The Gandhian era (1915-1947) transformed the freedom movement with mass participation. Non-Cooperation Movement (1920-22), Civil Disobedience Movement (1930-34), and Quit India Movement (1942) were major milestones. The Satyagraha technique became a powerful tool for resistance.',
                    'The final phase (1945-47) saw the Cabinet Mission Plan, direct action day, partition violence, and eventual independence with the Indian Independence Act, 1947. Understanding the communal politics and the two-nation theory is essential for analyzing this period.'
                ]
            }
        ];

         function Navbar({ rightSidebarOpen, setRightSidebarOpen, onArticlesClick, onHomeClick, onAboutClick, onCoursesClick, onTestSeriesOnlineClick, onTestSeriesOfflineClick, onDownloadsClick, currentView, user, isAdmin, onSignIn, onSignOut, onSavesClick, testSeriesMode }) {
            const activeLink = currentView === 'about' ? 'About' : currentView === 'courses' ? 'Courses' : currentView === 'test-series' ? 'Test Series' : currentView === 'test-series-detail' ? 'Test Series' : currentView === 'downloads' ? 'Downloads' : (currentView === 'articles' || currentView === 'article') ? 'Articles / Blog' : 'Home';
            const [menuOpen, setMenuOpen] = useState(false);
            const [tsDropdownOpen, setTsDropdownOpen] = useState(false);
            const [mobileTsOpen, setMobileTsOpen] = useState(false);
            const menuRef = React.useRef(null);
            const btnRef = React.useRef(null);
            const rightBtnRef = React.useRef(null);
            const tsDropRef = React.useRef(null);
            const links = ['Home', 'Courses', 'About', 'Articles / Blog', 'Downloads'];

            const handleLinkClick = (link) => {
                setMenuOpen(false);
                if (link === 'Articles / Blog' && onArticlesClick) {
                    onArticlesClick();
                } else if (link === 'Home' && onHomeClick) {
                    onHomeClick();
                } else if (link === 'About' && onAboutClick) {
                    onAboutClick();
                } else if (link === 'Courses' && onCoursesClick) {
                    onCoursesClick();
                } else if (link === 'Downloads' && onDownloadsClick) {
                    onDownloadsClick();
                }
            };

            useEffect(() => {
                if (!menuOpen) setMobileTsOpen(false);
            }, [menuOpen]);

            useEffect(() => {
                const handleClickOutside = (e) => {
                    if (menuOpen && menuRef.current && btnRef.current &&
                        !menuRef.current.contains(e.target) &&
                        !btnRef.current.contains(e.target)) {
                        setMenuOpen(false);
                    }
                    if (tsDropdownOpen && tsDropRef.current && !tsDropRef.current.contains(e.target)) {
                        setTsDropdownOpen(false);
                    }
                    if (rightSidebarOpen && rightBtnRef.current &&
                        !rightBtnRef.current.contains(e.target) &&
                        !e.target.closest('.sidebar-right') &&
                        !e.target.closest('.sidebar-right-overlay')) {
                        setRightSidebarOpen(false);
                    }
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, [menuOpen, rightSidebarOpen, tsDropdownOpen]);

            return (
                <>
                    <nav className="navbar">
                        <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                            <button ref={btnRef} className={`hamburger-btn ${menuOpen ? 'open' : ''}`} onClick={() => setMenuOpen(!menuOpen)}>
                                <span className="hamburger-line"></span>
                                <span className="hamburger-line"></span>
                                <span className="hamburger-line"></span>
                            </button>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                                <div className="navbar-logo-circle">
                                    <img src="logo.png" alt="Himdrishti Logo" />
                                </div>
                                <div className="navbar-logo">Himdrishti</div>
                            </div>
                            <div className="running-text">
                                <span style={{ color: '#4b5563', fontSize: '12px' }}>
                                    ✨ Empowering Vision Through Technology — Himdrishti Platform ✨
                                </span>
                            </div>
                        </div>
                        <div className="navbar-links">
                            {links.map(link => (
                                <a
                                    key={link}
                                    className={`nav-link ${activeLink === link ? 'nav-link-active' : ''}`}
                                    onClick={() => handleLinkClick(link)}
                                >
                                    {link}
                                </a>
                            ))}
                            {/* Test Series Dropdown */}
                            <div className="ts-dropdown-wrapper" ref={tsDropRef}>
                                <a
                                    className={`nav-link ${activeLink === 'Test Series' ? 'nav-link-active' : ''}`}
                                    onClick={() => setTsDropdownOpen(!tsDropdownOpen)}
                                    style={{ userSelect: 'none' }}
                                >
                                    Test Series
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" style={{ transition: 'transform 0.2s', transform: tsDropdownOpen ? 'rotate(180deg)' : 'rotate(0deg)', flexShrink: 0 }}><polyline points="6 9 12 15 18 9"></polyline></svg>
                                </a>
                                {tsDropdownOpen && (
                                    <div className="ts-dropdown-menu">
                                        <button className="ts-dropdown-item" onClick={() => { setTsDropdownOpen(false); onTestSeriesOnlineClick && onTestSeriesOnlineClick(); }}>
                                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
                                            COMPUTER BASED (CBT)
                                            {testSeriesMode === 'online' && <span className="ts-dropdown-badge" style={{ background: '#dbeafe', color: '#1d4ed8' }}>Active</span>}
                                        </button>
                                        <button className="ts-dropdown-item" onClick={() => { setTsDropdownOpen(false); onTestSeriesOfflineClick && onTestSeriesOfflineClick(); }}>
                                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M10.71 5.05A16 16 0 0 1 22.56 9"/><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
                                            OMR BASED (PDF FORMAT)
                                            {testSeriesMode === 'offline' && <span className="ts-dropdown-badge" style={{ background: '#fef9c3', color: '#854d0e' }}>Active</span>}
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                        <div className="navbar-actions">

                            {user ? (
                                <div style={{ display: 'flex', alignItems: 'center', gap: '16px' }}>
                                    {isAdmin && (
                                        <button
                                            className="nav-btn nav-btn-primary"
                                            style={{ padding: '8px 18px', fontSize: '13px', height: '38px', background: '#0f172a' }}
                                            onClick={() => window.open('admin.html', '_blank')}
                                        >
                                            Admin Panel
                                        </button>
                                    )}
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '10px', padding: '4px 10px', borderRadius: '30px', background: 'rgba(59, 130, 246, 0.05)', border: '1px solid rgba(59, 130, 246, 0.1)' }}>
                                        <img
                                            src={user.photoURL}
                                            alt="Profile"
                                            style={{ width: '28px', height: '28px', borderRadius: '50%', border: '1.5px solid #2563eb' }}
                                        />
                                        <div className="user-info-text">
                                            <div style={{ fontSize: '13px', fontWeight: 700, color: '#1f2937' }}>{user.displayName}</div>
                                        </div>
                                    </div>
                                    <button className="nav-btn nav-btn-outline" onClick={onSignOut} style={{ padding: '8px 18px', fontSize: '13px', height: '38px' }}>Logout</button>
                                </div>
                            ) : (
                                <>
                                    <button className="nav-btn nav-btn-outline" onClick={onSignIn}>Sign In</button>
                                    <button className="nav-btn nav-btn-primary" onClick={onSignIn}>Get Started</button>
                                </>
                            )}
                            <button ref={rightBtnRef} className={`hamburger-btn-right ${rightSidebarOpen ? 'open' : ''}`} onClick={() => setRightSidebarOpen(!rightSidebarOpen)} title="Toggle Right Sidebar">
                                <span className="hamburger-line"></span>
                                <span className="hamburger-line"></span>
                                <span className="hamburger-line"></span>
                            </button>
                        </div>
                    </nav>
                    <div ref={menuRef} className={`mobile-menu ${menuOpen ? 'open' : ''}`}>
                        {links.map(link => (
                            <a
                                key={link}
                                className={`mobile-menu-link ${activeLink === link ? 'mobile-menu-link-active' : ''}`}
                                onClick={() => handleLinkClick(link)}
                            >
                                {link}
                            </a>
                        ))}
                        <button
                            type="button"
                            className={`mobile-menu-link mobile-menu-ts-toggle ${activeLink === 'Test Series' ? 'mobile-menu-link-active' : ''}`}
                            onClick={() => setMobileTsOpen(!mobileTsOpen)}
                        >
                            <span>Test Series</span>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" style={{ transition: 'transform 0.2s', transform: mobileTsOpen ? 'rotate(180deg)' : 'rotate(0deg)', flexShrink: 0 }}><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </button>
                        {mobileTsOpen && (
                            <div className="mobile-menu-ts-submenu">
                                <button
                                    type="button"
                                    className="mobile-menu-ts-item"
                                    onClick={() => { setMenuOpen(false); setMobileTsOpen(false); onTestSeriesOnlineClick && onTestSeriesOnlineClick(); }}
                                >
                                    <span style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
                                        COMPUTER BASED (CBT)
                                    </span>
                                    {testSeriesMode === 'online' && <span className="ts-dropdown-badge" style={{ background: '#dbeafe', color: '#1d4ed8' }}>Active</span>}
                                </button>
                                <button
                                    type="button"
                                    className="mobile-menu-ts-item"
                                    onClick={() => { setMenuOpen(false); setMobileTsOpen(false); onTestSeriesOfflineClick && onTestSeriesOfflineClick(); }}
                                >
                                    <span style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M10.71 5.05A16 16 0 0 1 22.56 9"/><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
                                        OMR BASED (PDF FORMAT)
                                    </span>
                                    {testSeriesMode === 'offline' && <span className="ts-dropdown-badge" style={{ background: '#fef9c3', color: '#854d0e' }}>Active</span>}
                                </button>
                            </div>
                        )}
                        <div className="mobile-menu-actions">
                            {user ? (
                                <div style={{ width: '100%', display: 'flex', flexDirection: 'column', gap: '12px', padding: '10px' }}>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                                        <img src={user.photoURL} style={{ width: '40px', height: '40px', borderRadius: '50%' }} />
                                        <div style={{ flex: 1 }}>
                                            <div style={{ fontSize: '14px', fontWeight: 700 }}>{user.displayName}</div>
                                            <div style={{ fontSize: '12px', color: '#6b7280' }}>{user.email}</div>
                                        </div>
                                        <button className="nav-btn nav-btn-outline" onClick={onSignOut} style={{ padding: '6px 12px' }}>Logout</button>
                                    </div>
                                    {isAdmin && (
                                        <button
                                            className="nav-btn nav-btn-primary"
                                            style={{ width: '100%', background: '#0f172a' }}
                                            onClick={() => { setMenuOpen(false); window.open('admin.html', '_blank'); }}
                                        >
                                            Admin Panel
                                        </button>
                                    )}
                                </div>
                            ) : (
                                <>
                                    <button className="nav-btn nav-btn-outline" onClick={onSignIn} style={{ flex: 1 }}>Sign In</button>
                                    <button className="nav-btn nav-btn-primary" onClick={onSignIn} style={{ flex: 1 }}>Get Started</button>
                                </>
                            )}
                        </div>
                    </div>
                </>
            );
        }

        function LeftSidebarContent({ sidebarResources = [], sidebarDownloads = [], testSeries = [], onSeriesSelect, currentView, selectedTestSeries, userPurchases = [] }) {
            return (
                <>
                    {sidebarResources.length > 0 && (
                        <>
                            <div className="sidebar-section-title">Quick Resources</div>
                            {sidebarResources.map(res => {
                                const ts = testSeries.find(t => t.id === res.testSeriesId);
                                return (
                                    <div
                                        key={res.id}
                                        className={`sidebar-item ${currentView === 'test-series-detail' && selectedTestSeries?.id === res.testSeriesId ? 'sidebar-item-active' : ''}`}
                                        onClick={() => {
                                            if (ts) onSeriesSelect(ts);
                                        }}
                                        style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}
                                    >
                                        <div style={{ display: 'flex', alignItems: 'center', gap: '8px', flex: 1, minWidth: 0 }}>
                                            <span className="sidebar-icon">
                                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                                            </span>
                                            <div style={{ whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{res.title}</div>
                                        </div>
                                        {ts?.type === 'paid' && (
                                            hasActivePurchase(userPurchases, ts.id) ? (
                                                <div style={{ fontSize: '9px', background: '#d1fae5', color: '#065f46', padding: '1px 5px', borderRadius: '4px', fontWeight: 700, marginLeft: '4px', flexShrink: 0 }}>PURCHASED</div>
                                            ) : (
                                                <div style={{ fontSize: '9px', background: '#fef3c7', color: '#b45309', padding: '1px 5px', borderRadius: '4px', fontWeight: 700, marginLeft: '4px', flexShrink: 0 }}>PREMIUM</div>
                                            )
                                        )}
                                    </div>
                                );
                            })}
                        </>
                    )}

                    {sidebarDownloads.length > 0 && (
                        <>
                            <div className="sidebar-section-title" style={{ marginTop: '20px' }}>Quick Downloads</div>
                            {sidebarDownloads.map(res => (
                                <div
                                    key={res.id}
                                    className="sidebar-item"
                                    onClick={() => window.open(res.url, '_blank')}
                                >
                                    <span className="sidebar-icon">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                                    </span>
                                    <div style={{ whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{res.title}</div>
                                </div>
                            ))}
                        </>
                    )}

                    <div style={{ flex: 1 }}></div>
                    <div className="sidebar-section-title">Support</div>
                    <div className="sidebar-item"><span className="sidebar-icon"><Icons.Settings /></span>Settings</div>
                    <div className="sidebar-item"><span className="sidebar-icon"><Icons.HelpCircle /></span>Help</div>
                </>
            );
        }

        function LeftSidebar(props) {
            return (
                <div className="sidebar-left">
                    <LeftSidebarContent {...props} />
                </div>
            );
        }

        function CurrentAffairsPage({ affairs, categories, activeFilter, setFilter, onSelect, onBack, userPurchases = [] }) {

                <div className="center-content" style={{ padding: '30px' }}>

                                <path d="M19 12H5M12 19l-7-7 7-7" />

                                    padding: '10px 22px', borderRadius: '50px', fontSize: '13px', fontWeight: '600', cursor: 'pointer', border: 'none',

                                        background: activeFilter === cat.name ? '#2563eb' : '#f3f4f6',
                                        color: activeFilter === cat.name ? 'white' : '#4b5563',
                                        transition: 'all 0.2s', whiteSpace: 'nowrap'

                        <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>

                                const firstImage = ca.content?.find(item => item.type === 'image')?.value;
                                return (
                                    <div

                                        onClick={() => onSelect(ca)}

                                            padding: '12px', 
                                            cursor: 'pointer', 
                                            display: 'flex', 
                                            gap: '16px', 
                                            alignItems: 'center',

                                        <div style={{

                                                    🗞️
                                                </div>
                                            )}
                                        </div>

                                        {/* Content */}
                                        <div style={{ flex: 1, minWidth: 0 }}>
                                            <h3 style={{ 
                                                fontSize: '16px', 
                                                fontWeight: '700', 
                                                color: '#1f2937', 
                                                marginBottom: '6px', 
                                                lineHeight: '1.4',

                                                <span style={{ width: '4px', height: '4px', borderRadius: '50%', background: '#d1d5db' }}></span>
                                                <span style={{ fontSize: '13px', color: '#9ca3af' }}>
                                                    {new Date(ca.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}

                                        <div style={{ marginLeft: 'auto', padding: '8px' }}>

                                                ) : (
                                                    <span style={{ fontSize: '12px', fontWeight: '800', color: '#2563eb', background: '#eff6ff', padding: '6px 12px', borderRadius: '8px', border: '1px solid #2563eb' }}>₹{Number(ca.price) || ca.price}</span>
                                                )
                                            ) : (
                                                <span style={{ fontSize: '11px', fontWeight: '800', color: '#6b7280', background: '#f3f4f6', padding: '6px 12px', borderRadius: '8px' }}>FREE</span>
                                            )}
                                        </div>
                                    </div>
                                );
                            }) : (
                                <div style={{ textAlign: 'center', padding: '60px', background: '#f9fafb', borderRadius: '24px', border: '2px dashed #e5e7eb' }}>
                                    <div style={{ fontSize: '40px', marginBottom: '15px' }}>🗞️</div>
                                    <h3 style={{ fontWeight: '700', color: '#4b5563' }}>No updates found in this category</h3>
                                    <p style={{ color: '#9ca3af', fontSize: '14px' }}>Check back later for more daily updates.</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function ArticleView({ 
            article, articles = [], onAttemptQuiz, currentAffairs = [], answerWriting = [], testSeries = [], 
            onBack, onArticleSelect, onCurrentAffairSelect, onAnswerWritingSelect, onSeriesSelect, 
            user, onSignIn, userResults 
        }) {
            const [showComments, setShowComments] = useState(false);
            const [commentText, setCommentText] = useState('');
            const [comments, setComments] = useState([]);
            const [submitting, setSubmitting] = useState(false);
            const [quizAnswers, setQuizAnswers] = useState({});
            const [submittedTests, setSubmittedTests] = useState({});
            const [testResult, setTestResult] = useState(null);
            const [lastResults, setLastResults] = useState({});
            const commentSectionRef = useRef(null);

            useContentInterest('articles', article?.id, user);

            // Load saved quiz test states from localStorage and handle article changes
            useEffect(() => {
                if (article && article.id && window.firebaseDB) {
                    const { db, doc, updateDoc, increment } = window.firebaseDB;
                    if (updateDoc && increment) {
                        updateDoc(doc(db, "articles", article.id), { views: increment(1) }).catch(e => console.error(e));
                    }
                }
                
                setQuizAnswers({});
                setSubmittedTests({});
                setLastResults({});
                setTestResult(null);

                if (article && article.id && article.content) {
                    const loadedAnswers = {};
                    const loadedSubmitted = {};
                    const loadedResults = {};
                    let hasSaved = false;

                    article.content.forEach((item, idx) => {
                        if (item.type === 'quiz_test') {
                            const saved = localStorage.getItem(`himdrishti_quiz_test_${article.id}_${idx}`);
                            if (saved) {
                                try {
                                    const data = JSON.parse(saved);
                                    loadedSubmitted[idx] = true;
                                    loadedResults[idx] = data.result;
                                    if (data.answers) {
                                        Object.keys(data.answers).forEach(k => {
                                            loadedAnswers[k] = data.answers[k];
                                        });
                                    }
                                    hasSaved = true;
                                } catch (e) {
                                    console.error("Error parsing saved quiz test state", e);
                                }
                            }
                        }
                    });

                    if (hasSaved) {
                        setQuizAnswers(loadedAnswers);
                        setSubmittedTests(loadedSubmitted);
                        setLastResults(loadedResults);
                    }
                }
            }, [article.id]);

            // Load comments from Firebase in real-time
            useEffect(() => {
                if (window.firebaseDB && article.id) {
                    const { db, collection, onSnapshot, query, orderBy, doc } = window.firebaseDB;
                    const commentsRef = collection(doc(collection(db, 'articles'), article.id), 'comments');
                    const q = query(commentsRef, orderBy('createdAt', 'desc'));
                    const unsubscribe = onSnapshot(q, (snapshot) => {
                        const fetched = snapshot.docs.map(d => {
                            const data = d.data();
                            let timeStr = '';
                            if (data.createdAt) {
                                const date = data.createdAt.toDate ? data.createdAt.toDate() : new Date(data.createdAt);
                                timeStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) + ' at ' + date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
                            }
                            return {
                                id: d.id,
                                text: data.text,
                                userName: data.userName || 'Anonymous',
                                userPhoto: data.userPhoto || null,
                                time: timeStr
                            };
                        });
                        setComments(fetched);
                    });
                    return () => unsubscribe();
                }
            }, [article.id]);

            const handleSubmitComment = async () => {
                if (!commentText.trim() || !user || !window.firebaseDB) return;
                setSubmitting(true);
                try {
                    const { db, collection, addDoc, serverTimestamp, doc: fbDoc } = window.firebaseDB;
                    const commentsRef = collection(fbDoc(collection(db, 'articles'), article.id), 'comments');
                    await addDoc(commentsRef, {
                        text: commentText.trim(),
                        userName: user.displayName || 'User',
                        userPhoto: user.photoURL || null,
                        userEmail: user.email,
                        createdAt: serverTimestamp()
                    });
                    setCommentText('');
                } catch (err) {
                    console.error('Error posting comment:', err);
                }
                setSubmitting(false);
            };

            const [copied, setCopied] = useState(false);

            const handleShare = () => {
                const articleUrl = `${window.location.origin}${window.location.pathname}?article=${article.id}`;
                if (navigator.share) {
                    navigator.share({ title: article.title, text: article.title, url: articleUrl });
                } else {
                    navigator.clipboard.writeText(articleUrl).then(() => {
                        setCopied(true);
                        setTimeout(() => setCopied(false), 2500);
                    });
                }
            };

            const toggleComments = () => {
                setShowComments(!showComments);
                if (!showComments) {
                    setTimeout(() => {
                        commentSectionRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }, 100);
                }
            };

            const handleContentClick = (e) => {
                const link = e.target.closest('.article-link');
                if (link) {
                    e.preventDefault();
                    const type = link.dataset.type || 'article';
                    const id = link.dataset.id || link.dataset.articleId;

                    if (type === 'article') {
                        const found = articles.find(a => a.id === id);
                        if (found) onArticleSelect(found);
                    } else if (type === 'current-affair') {
                        const found = currentAffairs.find(a => a.id === id);
                        if (found) onCurrentAffairSelect(found);
                    } else if (type === 'answer-writing') {
                        const found = answerWriting.find(a => a.id === id);
                        if (found) onAnswerWritingSelect(found);
                    } else if (type === 'test-series') {
                        const found = testSeries.find(a => a.id === id);
                        if (found) onSeriesSelect(found);
                    }
                }
            };

            return (
                <div className="center-content" style={{ padding: '40px', maxWidth: '800px', margin: '0 auto', overflowY: 'auto', display: 'block' }}>
                    <button
                        onClick={onBack}
                        className="cta-btn cta-secondary"
                        style={{ marginBottom: '20px', display: 'flex', alignItems: 'center', gap: '8px' }}
                    >
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                            <path d="M19 12H5M12 19l-7-7 7-7" />
                        </svg>
                        Back to Articles
                    </button>

                    <div style={{ display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '24px' }}>
                        <span style={{
                            fontSize: '12px', fontWeight: 600, padding: '4px 12px',
                            borderRadius: '6px', background: `${article.color}20`, color: article.color,
                            textTransform: 'uppercase', letterSpacing: '0.5px',
                        }}>
                            {article.category}
                        </span>
                        <span style={{ fontSize: '12px', color: '#6b7280' }}>{article.date}</span>
                        <span style={{ fontSize: '12px', color: '#6b7280' }}>{article.readTime}</span>
                    </div>

                    <h1 style={{ fontSize: '32px', fontWeight: '800', color: '#1f2937', marginBottom: '20px', lineHeight: '1.2' }}>
                        {article.title}
                    </h1>

                    <div onClick={handleContentClick} style={{ fontSize: '16px', lineHeight: '1.7', color: '#4b5563', marginBottom: '20px' }}>
                        {/* Legacy Image/Video Support (for articles created before the dynamic system) */}
                        {article.imageLink && (!article.content || article.content.length === 0) && (() => {
                            const ytMatch = article.imageLink.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([\w-]{11})/);
                            if (ytMatch) {
                                return (
                                    <div style={{ position: 'relative', width: '100%', paddingBottom: '56.25%', height: 0, borderRadius: '16px', overflow: 'hidden', marginBottom: '24px', background: '#000' }}>
                                        <iframe
                                            src={`https://www.youtube.com/embed/${ytMatch[1]}?rel=0`}
                                            title={article.title}
                                            frameBorder="0"
                                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                                            allowFullScreen
                                            style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%' }}
                                        />
                                    </div>
                                );
                            } else {
                                return <img src={article.imageLink} style={{ width: '100%', borderRadius: '16px', marginBottom: '24px' }} alt={article.title} />;
                            }
                        })()}

                        {/* Render Dynamic Content Blocks */}
                        {article.content && article.content.map((item, idx) => {
                            // Support legacy string paragraphs
                            if (typeof item === 'string') {
                                return <p key={idx} style={{ marginBottom: '16px' }} dangerouslySetInnerHTML={{ __html: item }} />;
                            }

                            // Dynamic Blocks
                            if (item.type === 'paragraph') {
                                return <p key={idx} style={{ marginBottom: '16px' }} dangerouslySetInnerHTML={{ __html: item.value }} />;
                            }
                            if (item.type === 'image' && item.value) {
                                return <img key={idx} src={item.value} style={{ width: '100%', borderRadius: '16px', marginBottom: '24px' }} alt="Article Media" />;
                            }
                            if (item.type === 'video' && item.value) {
                                const ytMatch = item.value.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([\w-]{11})/);
                                if (ytMatch) {
                                    return (
                                        <div key={idx} style={{ position: 'relative', width: '100%', paddingBottom: '56.25%', height: 0, borderRadius: '16px', overflow: 'hidden', marginBottom: '24px', background: '#000' }}>
                                            <iframe
                                                src={`https://www.youtube.com/embed/${ytMatch[1]}?rel=0`}
                                                frameBorder="0"
                                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                                                allowFullScreen
                                                style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%' }}
                                            />
                                        </div>
                                    );
                                }
                            }
                            if (item.type === 'download' && item.value) {
                                return (
                                    <div key={idx} style={{ textAlign: 'center', margin: '24px 0', padding: '24px', background: 'rgba(59, 130, 246, 0.04)', borderRadius: '16px', border: '1px dashed rgba(59, 130, 246, 0.3)' }}>
                                        <h4 style={{ fontSize: '17px', fontWeight: '700', color: '#1f2937', marginBottom: '12px' }}>{item.label || 'Attached Resource'}</h4>
                                        <button className="cta-btn cta-primary" onClick={() => window.open(item.value, '_blank')} style={{ padding: '10px 28px', fontSize: '14px', borderRadius: '50px' }}>
                                            Download
                                        </button>
                                    </div>
                                );
                            }
                            if (item.type === 'list_table') {
                                const tableCells = item.cellRows
                                    ? item.cellRows.map(r => r.cells || [])
                                    : (item.cells || []);
                                if (!tableCells.length) return null;
                                return (
                                    <div key={idx} className="article-list-table-wrap" style={{ overflowX: 'auto', marginBottom: '24px', WebkitOverflowScrolling: 'touch' }}>
                                        <table className="article-list-table" style={{ width: '100%', minWidth: '280px', borderCollapse: 'collapse', fontSize: '14px', background: '#fff', borderRadius: '12px', overflow: 'hidden', boxShadow: '0 1px 3px rgba(0,0,0,0.06)' }}>
                                            <tbody>
                                                {tableCells.map((row, ri) => (
                                                    <tr key={ri}>
                                                        {row.map((cell, ci) => (
                                                            <td
                                                                key={ci}
                                                                style={{
                                                                    border: '1px solid #e5e7eb',
                                                                    padding: '10px 14px',
                                                                    color: '#374151',
                                                                    verticalAlign: 'top',
                                                                    background: ri === 0 ? '#f8fafc' : '#ffffff',
                                                                    wordBreak: 'break-word',
                                                                    lineHeight: 1.5
                                                                }}
                                                                dangerouslySetInnerHTML={{ __html: (cell && String(cell).trim()) ? cell : '—' }}
                                                            />
                                                        ))}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                );
                            }
                            if (item.type === 'quiz' && item.questions && item.questions.length > 0) {
                                return (
                                    <div key={idx} style={{ 
                                        margin: '30px 0', 
                                        padding: '24px', 
                                        background: '#faf5ff', 
                                        borderRadius: '24px', 
                                        border: '1px solid #f3e8ff',
                                        boxShadow: '0 10px 30px rgba(107, 33, 168, 0.03)'
                                    }}>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '20px' }}>
                                            <span style={{ 
                                                fontSize: '20px', 
                                                background: '#f3e8ff', 
                                                color: '#6b21a8', 
                                                width: '40px', 
                                                height: '40px', 
                                                borderRadius: '12px', 
                                                display: 'flex', 
                                                alignItems: 'center', 
                                                justifyContent: 'center' 
                                            }}>
                                                📝
                                            </span>
                                            <div>
                                                <h4 style={{ fontSize: '18px', fontWeight: '800', color: '#581c87', margin: 0 }}>Interactive Quiz</h4>
                                                <p style={{ fontSize: '12px', color: '#7e22ce', margin: 0 }}>Test your knowledge on the topic</p>
                                            </div>
                                        </div>
                                        
                                        <div style={{ display: 'flex', flexDirection: 'column', gap: '20px' }}>
                                            {item.questions.map((q, qIdx) => {
                                                const answerKey = `${idx}-${qIdx}`;
                                                const selectedOpt = quizAnswers[answerKey];
                                                const isAnswered = selectedOpt !== undefined;
                                                
                                                return (
                                                    <div key={qIdx} style={{ 
                                                        background: '#ffffff', 
                                                        padding: '20px', 
                                                        borderRadius: '16px', 
                                                        border: '1px solid #f3e8ff' 
                                                    }}>
                                                        <div style={{ display: 'flex', gap: '8px', marginBottom: '14px' }}>
                                                            <span style={{ 
                                                                background: '#f3e8ff', 
                                                                color: '#6b21a8', 
                                                                fontWeight: '800', 
                                                                fontSize: '12px', 
                                                                padding: '2px 8px', 
                                                                borderRadius: '6px', 
                                                                height: 'fit-content' 
                                                            }}>
                                                                Q{qIdx + 1}
                                                            </span>
                                                            <h5 style={{ fontSize: '15px', fontWeight: '700', color: '#1f2937', margin: 0, lineHeight: '1.4' }}>
                                                                {q.question}
                                                            </h5>
                                                        </div>
                                                        
                                                        <div style={{ display: 'flex', flexDirection: 'column', gap: '10px', marginBottom: isAnswered ? '16px' : 0 }}>
                                                            {['A', 'B', 'C', 'D'].map(opt => {
                                                                const optText = q.options?.[opt];
                                                                if (!optText) return null;
                                                                
                                                                const isSelected = selectedOpt === opt;
                                                                const isCorrect = q.correctOption === opt;
                                                                
                                                                let optBg = '#ffffff';
                                                                let optBorder = '#e2e8f0';
                                                                let optColor = '#4b5563';
                                                                let checkIcon = null;
                                                                
                                                                if (isAnswered) {
                                                                    if (isCorrect) {
                                                                        optBg = '#f0fdf4';
                                                                        optBorder = '#10b981';
                                                                        optColor = '#15803d';
                                                                        checkIcon = '✓';
                                                                    } else if (isSelected) {
                                                                        optBg = '#fef2f2';
                                                                        optBorder = '#ef4444';
                                                                        optColor = '#b91c1c';
                                                                        checkIcon = '✗';
                                                                    }
                                                                }
                                                                
                                                                return (
                                                                    <button 
                                                                        key={opt}
                                                                        disabled={isAnswered}
                                                                        onClick={() => {
                                                                            setQuizAnswers(prev => ({ ...prev, [answerKey]: opt }));
                                                                        }}
                                                                        style={{ 
                                                                            display: 'flex', 
                                                                            alignItems: 'center', 
                                                                            width: '100%', 
                                                                            padding: '12px 16px', 
                                                                            borderRadius: '12px', 
                                                                            border: `1.5px solid ${optBorder}`, 
                                                                            background: optBg, 
                                                                            color: optColor, 
                                                                            fontSize: '14px', 
                                                                            fontWeight: '600', 
                                                                            textAlign: 'left', 
                                                                            cursor: isAnswered ? 'default' : 'pointer', 
                                                                            transition: 'all 0.2s ease',
                                                                            gap: '10px'
                                                                        }}
                                                                    >
                                                                        <span style={{ 
                                                                            width: '24px', 
                                                                            height: '24px', 
                                                                            borderRadius: '50%', 
                                                                            background: isAnswered ? (isCorrect ? '#10b981' : isSelected ? '#ef4444' : '#f1f5f9') : '#f1f5f9', 
                                                                            color: isAnswered ? '#ffffff' : '#6b7280', 
                                                                            display: 'flex', 
                                                                            alignItems: 'center', 
                                                                            justifyContent: 'center', 
                                                                            fontSize: '11px', 
                                                                            fontWeight: '700',
                                                                            flexShrink: 0
                                                                        }}>
                                                                            {checkIcon || opt}
                                                                        </span>
                                                                        <span style={{ flex: 1 }}>{optText}</span>
                                                                    </button>
                                                                );
                                                            })}
                                                        </div>
                                                        
                                                        {isAnswered && q.explanation && (
                                                            <div style={{ 
                                                                background: '#f8fafc', 
                                                                padding: '14px 16px', 
                                                                borderRadius: '12px', 
                                                                borderLeft: '4px solid #6b21a8', 
                                                                animation: 'fadeIn 0.3s ease' 
                                                            }}>
                                                                <h6 style={{ fontSize: '12px', fontWeight: '700', color: '#581c87', margin: '0 0 4px 0' }}>Explanation:</h6>
                                                                <p style={{ fontSize: '13px', color: '#475569', margin: 0, lineHeight: '1.5' }}>{q.explanation}</p>
                                                            </div>
                                                        )}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                );
                            }
                            if (item.type === 'quiz_test' && item.questions && item.questions.length > 0) {
                                return (
                                    <div key={idx} style={{ 
                                        margin: '35px 0', 
                                        padding: '40px', 
                                        background: '#f0fdf4', 
                                        borderRadius: '24px', 
                                        border: '1px solid #d1fae5',
                                        boxShadow: '0 10px 30px rgba(4, 120, 87, 0.03)',
                                        display: 'flex',
                                        flexDirection: 'column',
                                        alignItems: 'center',
                                        justifyContent: 'center',
                                        gap: '24px'
                                    }}>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: '15px' }}>
                                            <span style={{ 
                                                fontSize: '32px', 
                                                background: '#d1fae5', 
                                                color: '#047857', 
                                                width: '64px', 
                                                height: '64px', 
                                                borderRadius: '16px', 
                                                display: 'flex', 
                                                alignItems: 'center', 
                                                justifyContent: 'center' 
                                            }}>
                                                🏆
                                            </span>
                                            <div style={{ textAlign: 'center' }}>
                                                <h4 style={{ fontSize: '24px', fontWeight: '800', color: '#064e3b', margin: '0 0 4px 0' }}>{item.name?.trim() || 'Quiz Test'}</h4>
                                                <p style={{ fontSize: '14px', color: '#047857', margin: 0 }}>Test your preparation · {(item.questions || []).length} Questions</p>
                                            </div>
                                        </div>
                                        {(() => {
                                            const quizName = item.name?.trim() || 'Unnamed Quiz';
                                            const isTaken = userResults && userResults.some(r => r.quizName === quizName);
                                            return (
                                                <button 
                                                    onClick={() => typeof onAttemptQuiz === 'function' && onAttemptQuiz(item)}
                                                    style={{ 
                                                        padding: '16px 48px', 
                                                        fontSize: '18px', 
                                                        fontWeight: '700',
                                                        borderRadius: '50px', 
                                                        background: isTaken ? '#3b82f6' : '#047857', 
                                                        color: '#ffffff',
                                                        border: 'none',
                                                        boxShadow: isTaken ? '0 4px 14px rgba(59, 130, 246, 0.3)' : '0 4px 14px rgba(4, 120, 87, 0.3)',
                                                        cursor: 'pointer',
                                                        transition: 'all 0.3s ease'
                                                    }}
                                                    onMouseEnter={e => e.currentTarget.style.transform = 'translateY(-2px)'}
                                                    onMouseLeave={e => e.currentTarget.style.transform = 'translateY(0)'}
                                                >
                                                    {isTaken ? 'Result' : 'Attempt Test'}
                                                </button>
                                            );
                                        })()}
                                    </div>
                                );
                            }
                            return null;
                        })}

                        {/* Fallback for legacy paragraphs field if content is missing */}
                        {!article.content && article.paragraphs && article.paragraphs.map((p, idx) => (
                            <p key={idx} style={{ marginBottom: '16px' }} dangerouslySetInnerHTML={{ __html: p }} />
                        ))}
                    </div>

                    {/* Comment & Share Buttons */}
                    <div style={{ display: 'flex', gap: '12px', marginTop: '32px', alignItems: 'center', flexWrap: 'wrap' }}>
                        <button className="cta-btn cta-primary" onClick={toggleComments} style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                            </svg>
                            Comment {comments.length > 0 && `(${comments.length})`}
                        </button>
                        <button className="cta-btn cta-secondary" onClick={handleShare} style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                <circle cx="18" cy="5" r="3" />
                                <circle cx="6" cy="12" r="3" />
                                <circle cx="18" cy="19" r="3" />
                                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
                                <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
                            </svg>
                            {copied ? '✓ Link Copied!' : 'Share'}
                        </button>
                        {copied && (
                            <span style={{ fontSize: '12px', color: '#10b981', fontWeight: 600, animation: 'fadeInUp 0.3s ease' }}>
                                Article link copied to clipboard!
                            </span>
                        )}
                    </div>

                    {/* Comment Section */}
                    {showComments && (
                        <div className="comment-section" ref={commentSectionRef}>
                            <div className="comment-section-header">
                                <h3>Comments</h3>
                                <span className="comment-count-badge">{comments.length}</span>
                            </div>

                            {/* Comment Input */}
                            {user ? (
                                <div className="comment-input-box">
                                    <img src={user.photoURL} alt="You" className="comment-avatar" />
                                    <div className="comment-input-wrapper">
                                        <textarea
                                            className="comment-textarea"
                                            placeholder="Write your comment..."
                                            value={commentText}
                                            onChange={(e) => setCommentText(e.target.value)}
                                            onKeyDown={(e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSubmitComment(); } }}
                                        />
                                        <button
                                            className="comment-submit-btn"
                                            onClick={handleSubmitComment}
                                            disabled={!commentText.trim() || submitting}
                                        >
                                            {submitting ? 'Posting...' : 'Post Comment'}
                                        </button>
                                    </div>
                                </div>
                            ) : (
                                <div className="comment-login-prompt">
                                    <p>Sign in to join the conversation</p>
                                    <button className="comment-login-btn" onClick={onSignIn}>Sign In with Google</button>
                                </div>
                            )}

                            {/* Comment List */}
                            <div className="comment-list">
                                {comments.length === 0 ? (
                                    <div className="comment-empty">
                                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                                        </svg>
                                        <p>No comments yet. Be the first to share your thoughts!</p>
                                    </div>
                                ) : (
                                    comments.map(c => (

                                <div style={{ 
                                    background: '#f8fafc', 
                                    borderRadius: '20px', 
                                    padding: '20px', 
                                    display: 'grid', 
                                    gridTemplateColumns: '1fr 1fr 1fr', 
                                    gap: '12px', 
                                    marginBottom: '26px' 
                                }}>
                                    <div style={{ padding: '8px' }}>
                                        <div style={{ fontSize: '22px', fontWeight: '800', color: '#10b981' }}>{testResult.correct}</div>
                                        <div style={{ fontSize: '11px', fontWeight: '700', color: '#64748b', marginTop: '4px' }}>Correct</div>
                                    </div>
                                    <div style={{ padding: '8px', borderLeft: '1px solid #e2e8f0', borderRight: '1px solid #e2e8f0' }}>

                                        <div style={{ fontSize: '11px', fontWeight: '700', color: '#64748b', marginTop: '4px' }}>Incorrect</div>

                                <div style={{ 
                                    display: 'flex',

                                    fontWeight: '800', 
                                    color: '#047857',
                                    background: '#ecfdf5',

                                    marginBottom: '28px',
                                    border: '1.5px dashed #a7f3d0'
