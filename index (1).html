                        <div className="quiz-attempt-center">
                            <div className="quiz-attempt-q-header">
                                <h3 style={{ margin: 0, color: '#064e3b', fontSize: '16px', fontWeight: '700' }}>{activeCategory}</h3>
                                <span style={{ color: '#4b5563', fontSize: '14px', fontWeight: '600' }}>Question {(filteredIndices.indexOf(currentQuestionIdx) + 1) || 1} of {filteredIndices.length}</span>
                            </div>
                            
                            <div className="quiz-attempt-q-body">
                                {currentQ && (
                                    <>
                                        <div style={{ display: 'flex', flexDirection: 'column', gap: '12px', marginBottom: '32px' }}>
                                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                                                <span style={{ color: '#047857', fontWeight: '800', fontSize: '18px' }}>Q{currentQuestionIdx + 1}.</span>
                                                <QuestionMarksPills marks={currentQ.marks} negativeMarks={currentQ.negativeMarks} />
                                            </div>
                                            <h4 style={{ margin: 0, fontSize: '18px', color: '#1f2937', fontWeight: '700', lineHeight: '1.6' }}>{currentQ.question}</h4>
                                        </div>
                                        
                                        <div className="quiz-attempt-options">
                                            {['A', 'B', 'C', 'D'].map(opt => {
                                                if (!currentQ.options || !currentQ.options[opt]) return null;
                                                const isSelected = answers[currentQuestionIdx] === opt;
                                                return (
                                                    <div 
                                                        key={opt}
                                                        onClick={() => handleOptionSelect(opt)}
                                                        style={{ 
                                                            display: 'flex', 
                                                            alignItems: 'center', 
                                                            gap: '16px',
                                                            cursor: 'pointer',
                                                            padding: '12px 16px',
                                                            borderRadius: '12px',
                                                            border: isSelected ? '1px solid #3b82f6' : '1px solid transparent',
                                                            background: isSelected ? '#eff6ff' : 'transparent',
                                                            transition: 'all 0.2s ease'
                                                        }}
                                                    >
                                                        <div style={{ 
                                                            width: '20px', 
                                                            height: '20px', 
                                                            borderRadius: '50%', 
                                                            border: isSelected ? '6px solid #3b82f6' : '2px solid #cbd5e1',
                                                            background: '#ffffff'
                                                        }}></div>
                                                        <span style={{ fontWeight: '700', color: '#4b5563', width: '20px' }}>{opt}.</span>
                                                        <span style={{ fontSize: '16px', color: '#1f2937' }}>{currentQ.options[opt]}</span>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </>
                                )}
                            </div>

                            <div className="quiz-attempt-q-footer">
                                <button onClick={handlePrev} disabled={currentQuestionIdx === 0} className="quiz-attempt-q-btn" style={{ 
                                    background: '#f8fafc', 
                                    borderColor: '#cbd5e1', 
                                    color: '#475569', 
                                    cursor: currentQuestionIdx === 0 ? 'not-allowed' : 'pointer',
                                    opacity: currentQuestionIdx === 0 ? 0.6 : 1
                                }}>
                                    <span style={{ color: '#6366f1', fontSize: '18px' }}>‹</span> Previous
                                </button>
                                
                                <button onClick={handleSaveNext} className="quiz-attempt-q-btn" style={{ 
                                    background: '#f0fdf4', 
                                    borderColor: '#86efac', 
                                    color: '#166534', 
                                    fontWeight: '700'
                                }}>
                                    Save & Next <span style={{ fontSize: '18px' }}>›</span>
                                </button>

                                <button onClick={handleClearAnswer} className="quiz-attempt-q-btn" style={{ 
                                    background: '#fef2f2', 
                                    borderColor: '#fecaca', 
                                    color: '#b91c1c'
                                }}>
                                    <span style={{ fontSize: '14px' }}>✕</span> Clear Answer
                                </button>
                            </div>
                        </div>

                        <div className={`quiz-attempt-sidebar-right ${!mobilePaletteOpen ? 'collapsed-mobile' : ''}`}>
                            <button type="button" className="quiz-mobile-palette-toggle" onClick={() => setMobilePaletteOpen(!mobilePaletteOpen)}>
                                {mobilePaletteOpen ? '▲ Hide Question Palette' : '▼ Show Question Palette & Legend'}
                            </button>

                            {/* User Info & Exit */}
                            <div style={{ padding: '16px', borderBottom: '2px solid #f1f5f9', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '12px' }}>
                                <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '4px' }}>
                                    <div style={{ width: '48px', height: '48px', background: '#e0e7ff', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#4338ca', fontSize: '20px', fontWeight: '700', marginBottom: '4px' }}>
                                        {user ? (user.displayName ? user.displayName.charAt(0).toUpperCase() : user.email.charAt(0).toUpperCase()) : 'G'}
                                    </div>
                                    <h4 style={{ margin: 0, fontSize: '14px', fontWeight: '800', color: '#1f2937', textAlign: 'center' }}>
                                        {user ? (user.displayName || 'Guest User') : 'Guest User'}
                                    </h4>
                                    <p style={{ margin: 0, fontSize: '11px', color: '#6b7280', textAlign: 'center', wordBreak: 'break-all' }}>
                                        {user ? user.email : 'guest@example.com'}
                                    </p>
                                </div>
                                <button onClick={() => onBack()} style={{ width: '100%', padding: '8px', background: '#fef2f2', border: '1px solid #fecaca', borderRadius: '8px', color: '#dc2626', fontWeight: '700', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '6px', fontSize: '13px', transition: 'all 0.2s ease' }} onMouseEnter={e => e.currentTarget.style.background = '#fee2e2'} onMouseLeave={e => e.currentTarget.style.background = '#fef2f2'}>
                                    ⏹️ Exit Test
                                </button>
                            </div>

                            {/* Legend Section */}
                            <div style={{ padding: '14px 14px 10px', borderBottom: '2px solid #f1f5f9' }}>
                                <p style={{ margin: '0 0 10px 0', fontSize: '13px', fontWeight: '800', color: '#374151', textAlign: 'center', letterSpacing: '1px', textTransform: 'uppercase' }}>Legend</p>
                                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '10px' }}>
                                    {/* Marked */}
                                    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '5px' }}>
                                        <div style={{ width: '36px', height: '36px', borderRadius: '50%', background: '#f97316', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontWeight: '700', fontSize: '14px', boxShadow: '0 2px 6px rgba(249,115,22,0.35)' }}>1</div>
                                        <span style={{ fontSize: '11px', fontWeight: '600', color: '#6b7280' }}>Marked</span>
                                    </div>
                                    {/* Answered */}
                                    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '5px' }}>
                                        <div style={{ width: '36px', height: '36px', borderRadius: '50%', background: '#22c55e', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontWeight: '700', fontSize: '14px', boxShadow: '0 2px 6px rgba(34,197,94,0.35)' }}>2</div>
                                        <span style={{ fontSize: '11px', fontWeight: '600', color: '#6b7280' }}>Answered</span>
                                    </div>
                                    {/* Not Answered */}
                                    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '5px' }}>
                                        <div style={{ width: '36px', height: '36px', borderRadius: '50%', background: '#ef4444', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontWeight: '700', fontSize: '14px', boxShadow: '0 2px 6px rgba(239,68,68,0.35)' }}>3</div>
                                        <span style={{ fontSize: '11px', fontWeight: '600', color: '#6b7280' }}>Not Answered</span>
                                    </div>
                                </div>
                            </div>

                            {/* Question Number Grid */}
                            <div className="quiz-attempt-palette-grid">
                                {filteredIndices.map(qIdx => {
                                    const isAns = answers[qIdx] !== undefined;
                                    const isMarked = markedForReview[qIdx];
                                    const isCurrent = currentQuestionIdx === qIdx;
                                    let bg, color, shadow;
                                    if (isAns && isMarked) { bg = '#f97316'; color = '#ffffff'; shadow = '0 2px 5px rgba(249,115,22,0.4)'; }
                                    else if (isAns) { bg = '#22c55e'; color = '#ffffff'; shadow = '0 2px 5px rgba(34,197,94,0.4)'; }
                                    else if (isMarked) { bg = '#f97316'; color = '#ffffff'; shadow = '0 2px 5px rgba(249,115,22,0.4)'; }
                                    else { bg = '#ffffff'; color = '#374151'; shadow = 'none'; }

                                    return (
                                        <div
                                            key={qIdx}
                                            onClick={() => {
                                                const q = quizData.questions[qIdx];
                                                const cat = (q && q.category) ? q.category : (categories[0] || 'General');
                                                setActiveCategory(cat);
                                                setCurrentQuestionIdx(qIdx);
                                            }}
                                            style={{
                                                width: '38px',
                                                height: '38px',
                                                borderRadius: '50%',
                                                display: 'flex',
                                                alignItems: 'center',
                                                justifyContent: 'center',
                                                background: bg,
                                                color: color,
                                                border: isCurrent ? '3px solid #1d4ed8' : (bg === '#ffffff' ? '2px solid #cbd5e1' : 'none'),
                                                fontWeight: '700',
                                                fontSize: '13px',
                                                cursor: 'pointer',
                                                boxShadow: isCurrent ? '0 0 0 3px rgba(59,130,246,0.3)' : shadow,
                                                transition: 'all 0.15s ease'
                                            }}
                                        >
                                            {qIdx + 1}
                                        </div>
                                    );
                                })}
                            </div>

                            {/* Bottom Buttons */}
                            <div style={{ padding: '12px', borderTop: '1px solid #e2e8f0', display: 'flex', flexDirection: 'column', gap: '8px' }}>
                                <button onClick={handleMarkReview} style={{ padding: '9px', background: '#fff7ed', border: '1px solid #fed7aa', borderRadius: '8px', color: '#c2410c', fontWeight: '700', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '6px', fontSize: '13px' }}>
                                    🔖 Mark for Review
                                </button>
                                <button onClick={handleClearAnswer} style={{ padding: '9px', background: '#fef2f2', border: '1px solid #fecaca', borderRadius: '8px', color: '#dc2626', fontWeight: '700', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '6px', fontSize: '13px' }}>
                                    ✕ Clear Response
                                </button>
                            </div>
                        </div>
                    </div>

                    <div className="quiz-attempt-bottom-bar">
                        <div style={{ display: 'flex', alignItems: 'center', gap: '10px', background: '#f0fdf4', padding: '10px 20px', borderRadius: '8px', color: '#166534', fontWeight: '700' }}>
                            <span>⏱️</span> Time Left: {formatTime(timeLeft)}
                        </div>
                        
                        <div className="quiz-attempt-bottom-actions">
                            <button onClick={() => { handleMarkReview(); handleSaveNext(); }} style={{ background: '#f8fafc', borderColor: '#cbd5e1', color: '#4f46e5' }}>
                                📄 Mark for Review & Next
                            </button>
                            <button onClick={handleSubmit} style={{ background: '#f0fdf4', borderColor: '#86efac', color: '#166534' }}>
                                ✅ Submit Test
                            </button>
                        </div>
                    </div>
                    
                    <div className="quiz-attempt-warning">
                        🔒 Do not refresh or close the window during the test.
                    </div>
                </div>
            );
        }
        function App() {
            const [rightSidebarOpen, setRightSidebarOpen] = useState(true);
            const [leftSidebarOpen, setLeftSidebarOpen] = useState(false);
            const [currentView, setCurrentView] = useState(() => getViewFromUrl()?.view || 'welcome');
            const [previousView, setPreviousView] = useState(null);

            const [selectedQuizAttempt, setSelectedQuizAttempt] = useState(null);
            
            const handleAttemptQuiz = (quizData) => {
                if (!user) {
                    alert("Please Sign In with Google to attempt the Quiz Test.");
                    handleSignIn();
                    return;
                }
                setPreviousView(currentView);
                const quizName = quizData.name?.trim() || 'Unnamed Quiz';
                const existingResult = userResults.find(r => r.quizName === quizName);
                if (existingResult) {
                    setSelectedQuizAttempt({
                        ...quizData,
                        questions: quizData.questions?.length ? quizData.questions : (existingResult.questions || []),
                        savedResult: existingResult
                    });
                    setCurrentView('quiz-attempt');
                } else {
                    setSelectedQuizAttempt(quizData);
                    setCurrentView('quiz-attempt');
                }
            };
    
            const [selectedArticle, setSelectedArticle] = useState(null);
            const [user, setUser] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [articles, setArticles] = useState([]);
            const [downloads, setDownloads] = useState([]);
            const [testSeries, setTestSeries] = useState([]);
            const [categories, setCategories] = useState([]);
            const [downloadCategories, setDownloadCategories] = useState([]);
            const [filteredCategory, setFilteredCategory] = useState(null);
            const [selectedTestSeries, setSelectedTestSeries] = useState(null);
            const [sidebarResources, setSidebarResources] = useState([]);
            const [sidebarDownloads, setSidebarDownloads] = useState([]);
            const [currentAffairs, setCurrentAffairs] = useState([]);
            const [currentAffairCategories, setCurrentAffairCategories] = useState([]);
            const [selectedCurrentAffair, setSelectedCurrentAffair] = useState(null);
            const [caFilter, setCaFilter] = useState('All');

            const [gsNotes, setGsNotes] = useState([]);
            const [answerWriting, setAnswerWriting] = useState([]);
            const [pyqs, setPyqs] = useState([]);
            const [selectedGsNote, setSelectedGsNote] = useState(null);
            const [selectedAnswerWriting, setSelectedAnswerWriting] = useState(null);
            const [selectedPyq, setSelectedPyq] = useState(null);
            
            const [userPurchases, setUserPurchases] = useState([]);
            const [userResults, setUserResults] = useState([]);

            useEffect(() => {
                if (window.firebaseDB && user) {
                    const { db, collection, onSnapshot, query, where } = window.firebaseDB;
                    const unsub = onSnapshot(query(collection(db, "quizResults"), where("userId", "==", user.uid)), (snapshot) => {
                        const res = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        res.sort((a, b) => b.timestamp - a.timestamp);
                        setUserResults(res);
                    });
                    return () => unsub();
                } else {
                    setUserResults([]);
                }
            }, [user]);
            const [isBuyModalOpen, setIsBuyModalOpen] = useState(false);
            const [buyingItem, setBuyingItem] = useState(null);
            const [articleHistory, setArticleHistory] = useState([]);
            const scrollPositions = React.useRef({});

            const getViewKey = (view, art, ts, ca, cat) => {
                if (art) return `article-${art.id}`;
                if (ts) return `ts-${ts.id}`;
                if (ca) return `ca-${ca.id}`;
                if (view === 'articles') return `articles-${cat || 'all'}`;
                return view;
            };

            const saveScrollPosition = () => {
                const center = document.querySelector('.center-content');
                if (center) {
                    const key = getViewKey(currentView, selectedArticle, selectedTestSeries, selectedCurrentAffair, filteredCategory);
                    scrollPositions.current[key] = center.scrollTop;
                }
            };

            // Global scroll management to preserve position when coming back
            React.useLayoutEffect(() => {
                const center = document.querySelector('.center-content');
                if (!center) return;

                const viewKey = getViewKey(currentView, selectedArticle, selectedTestSeries, selectedCurrentAffair, filteredCategory);
                
                // Restore scroll position if it exists, otherwise top
                if (scrollPositions.current[viewKey] !== undefined) {
                    center.scrollTop = scrollPositions.current[viewKey];
                } else {
                    center.scrollTop = 0;
                }
            }, [currentView, selectedArticle, selectedTestSeries, selectedCurrentAffair, filteredCategory]);

            useEffect(() => {
                if (window.firebaseAuth) {
                    const { auth, onAuthStateChanged } = window.firebaseAuth;
                    const unsubscribe = onAuthStateChanged(auth, async (currentUser) => {
                        setUser(currentUser);
                        if (currentUser && window.firebaseDB) {
                            const { db, doc, setDoc, updateDoc, getDoc, serverTimestamp } = window.firebaseDB;
                            const userRef = doc(db, 'users', currentUser.uid);
                            const profileData = {
                                uid: currentUser.uid,
                                email: currentUser.email || '',
                                displayName: currentUser.displayName || '',
                                photoURL: currentUser.photoURL || '',
                                lastLoginAt: serverTimestamp(),
                            };
                            try {
                                const snap = await getDoc(userRef);
                                if (!snap.exists()) {
                                    await setDoc(userRef, {
                                        ...profileData,
                                        isAdmin: currentUser.email === PERMANENT_ADMIN_EMAIL,
                                        createdAt: serverTimestamp(),
                                    });
                                } else {
                                    const updates = { ...profileData };
                                    if (currentUser.email === PERMANENT_ADMIN_EMAIL) {
                                        updates.isAdmin = true;
                                    }
                                    await updateDoc(userRef, updates);
                                }
                            } catch (err) {
                                console.error('Failed to sync user profile:', err);
                            }
                        }
                    });
                    return () => unsubscribe();
                }
            }, []);

            useEffect(() => {
                if (window.firebaseDB && user) {
                    const { db, doc, onSnapshot } = window.firebaseDB;
                    const unsub = onSnapshot(doc(db, 'users', user.uid), (snap) => {
                        const data = snap.data();
                        setIsAdmin(data?.isAdmin === true || user.email === PERMANENT_ADMIN_EMAIL);
                    }, () => setIsAdmin(user.email === PERMANENT_ADMIN_EMAIL));
                    return () => unsub();
                }
                setIsAdmin(false);
            }, [user]);

            useEffect(() => {
                if (window.firebaseDB) {
                    const { db, collection, onSnapshot, query, orderBy } = window.firebaseDB;

                    // Articles Listener
                    const qArt = query(collection(db, "articles"), orderBy("createdAt", "desc"));
                    const unsubArt = onSnapshot(qArt, (snapshot) => {
                        const fetchedArticles = snapshot.docs.map(doc => {
                            const data = doc.data();
                            const d = new Date(data.createdAt);
                            const colors = ['#3b82f6', '#2563eb', '#60a5fa', '#1d4ed8', '#10b981', '#f59e0b'];
                            const color = colors[Math.floor(Math.random() * colors.length)];
                            return {
                                id: doc.id,
                                title: data.heading,
                                category: data.category || 'General',
                                date: d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
                                readTime: '5 min read',
                                color: color,
                                content: data.content || data.paragraphs || [],
                                imageLink: data.imageLink || null
                            };
                        });
                        setArticles(fetchedArticles);
                        // Auto-open article from URL param on first load
                        const params = new URLSearchParams(window.location.search);
                        const articleId = params.get('article');
                        if (articleId) {
                            const found = fetchedArticles.find(a => a.id === articleId);
                            if (found) {
                                setSelectedArticle(found);
                                setCurrentView('article');
                                setRightSidebarOpen(false);
                            }
                        }
                    });

                    // Downloads Listener
                    const qDown = query(collection(db, "downloads"), orderBy("createdAt", "desc"));
                    const unsubDown = onSnapshot(qDown, (snapshot) => {
                        const fetched = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                        setDownloads(fetched);
                    });

                    // Categories Listener
                    const qCat = query(collection(db, "categories"), orderBy("name", "asc"));
                    const unsubCat = onSnapshot(qCat, (snapshot) => {
                        const fetched = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                        setCategories(fetched);
                    });

                    // Download Categories Listener
                    const qDownCat = query(collection(db, "downloadCategories"), orderBy("name", "asc"));
                    const unsubDownCat = onSnapshot(qDownCat, (snapshot) => {
                        const fetched = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                        setDownloadCategories(fetched);
                    });

                    // Test Series Listener
                    const qTest = query(collection(db, "testSeries"), orderBy("createdAt", "desc"));
                    const unsubTest = onSnapshot(qTest, (snapshot) => {
                        const fetched = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                        setTestSeries(fetched);
                    });

                    const unsubSidebar = onSnapshot(collection(db, "sidebarResources"), (snapshot) => {
                        setSidebarResources(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    });

                    const unsubSidebarDown = onSnapshot(collection(db, "sidebarDownloads"), (snapshot) => {
                        setSidebarDownloads(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    });

                    const unsubCACat = onSnapshot(query(collection(db, "currentAffairCategories"), orderBy("name")), (snapshot) => {
                        setCurrentAffairCategories(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    });

                    const unsubCA = onSnapshot(query(collection(db, "currentAffairs"), orderBy("createdAt", "desc")), (snapshot) => {
                        setCurrentAffairs(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    });

                    const unsubGS = onSnapshot(query(collection(db, "gsNotes"), orderBy("createdAt", "desc")), (snapshot) => {
                        setGsNotes(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    });

                    const unsubAW = onSnapshot(query(collection(db, "answerWriting"), orderBy("createdAt", "desc")), (snapshot) => {
                        setAnswerWriting(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    });

                    const unsubPYQ = onSnapshot(query(collection(db, "pyqs"), orderBy("createdAt", "desc")), (snapshot) => {
                        setPyqs(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    });

                    return () => { unsubArt(); unsubDown(); unsubCat(); unsubDownCat(); unsubTest(); unsubSidebar(); unsubSidebarDown(); unsubCACat(); unsubCA(); unsubGS(); unsubAW(); unsubPYQ(); };
                }
            }, []);

            useEffect(() => {
                if (window.firebaseDB && user) {
                    const { db, collection, onSnapshot, query, where } = window.firebaseDB;
                    const unsubPurchases = onSnapshot(query(collection(db, "purchases"), where("userId", "==", user.uid)), (snapshot) => {
                        setUserPurchases(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    });
                    return () => unsubPurchases();
                } else {
                    setUserPurchases([]);
                }
            }, [user]);

            const handleSignIn = async () => {
                if (window.firebaseAuth) {
                    const { auth, provider, signInWithPopup } = window.firebaseAuth;
                    try {
                        await signInWithPopup(auth, provider);
                    } catch (error) {
                        console.error("Sign-in error:", error);
                    }
                }
            };

            const handleSignOut = () => {
                if (window.firebaseAuth) {
                    const { auth, signOut } = window.firebaseAuth;
                    signOut(auth);
                }
            };

            const handleArticlesClick = () => {
                saveScrollPosition();
                setFilteredCategory(null);
                setCurrentView('articles');
                setSelectedArticle(null);
                setArticleHistory([]);
                setRightSidebarOpen(false);
                syncUrlForView('articles', { clearArticle: true });
            };

            const handleCategoryClick = (catName) => {
                saveScrollPosition();
                if (catName === 'GS Notes') {
                    setCurrentView('gsNotes');
                    syncUrlForView('gsNotes', { clearArticle: true });
                } else if (catName === 'Answer Writing') {
                    setCurrentView('answerWriting');
                    syncUrlForView('answerWriting', { clearArticle: true });
                } else if (catName === 'PYQs') {
                    setCurrentView('pyqs');
                    syncUrlForView('pyqs', { clearArticle: true });
                } else {
                    setFilteredCategory(catName);
                    setCurrentView('articles');
                    syncUrlForView('articles', { clearArticle: true });
                }
                setSelectedArticle(null);
                setArticleHistory([]);
                setRightSidebarOpen(false);
            };

            const handleArticleSelect = (article) => {
                saveScrollPosition();
                if (article && selectedArticle && selectedArticle.id !== article.id) {
                    setArticleHistory(prev => [...prev, selectedArticle]);
                }
                setSelectedArticle(article);
                setCurrentView(article ? 'article' : 'articles');
                setRightSidebarOpen(false);
                // Update URL with article ID for deep linking
                if (article) {
                    const url = new URL(window.location);
                    url.searchParams.set('article', article.id);
                    window.history.pushState({}, '', url);
                } else {
                    setArticleHistory([]);
                    const url = new URL(window.location);
                    url.searchParams.delete('article');
                    window.history.pushState({}, '', url);
                }
            };

            const handleArticleBack = () => {
                saveScrollPosition();
                if (articleHistory.length > 0) {
                    const prevArticle = articleHistory[articleHistory.length - 1];
                    setArticleHistory(prev => prev.slice(0, -1));
                    setSelectedArticle(prevArticle);
                    // Update URL
                    const url = new URL(window.location);
                    url.searchParams.set('article', prevArticle.id);
                    window.history.pushState({}, '', url);
                } else {
                    setSelectedArticle(null);
                    setCurrentView('articles');
                    setArticleHistory([]);
                    // Update URL
                    const url = new URL(window.location);
                    url.searchParams.delete('article');
                    window.history.pushState({}, '', url);
                }
            };

            const handleCurrentAffairsClick = () => {
                saveScrollPosition();
                setCurrentView('current-affairs');
                setSelectedCurrentAffair(null);
                setRightSidebarOpen(false);
                syncUrlForView('current-affairs', { clearArticle: true });
            };

            const handleCurrentAffairSelect = (ca) => {
                if (!ca) {
                    saveScrollPosition();
                    setSelectedCurrentAffair(null);
                    setCurrentView('current-affairs');
                    return;
                }

                if (ca.type === 'paid' && !hasActivePurchase(userPurchases, ca.id)) {
                    if (!user) {
                        alert("Please sign in to unlock this update.");
                        handleSignIn();
                        return;
                    }
                    setBuyingItem({ ...ca, itemType: 'current-affair' });
                    setIsBuyModalOpen(true);
                    return;
                }

                saveScrollPosition();
                setSelectedCurrentAffair(ca);
                setCurrentView('current-affair-detail');
                setRightSidebarOpen(false);
            };

            const handleHomeClick = () => {
                saveScrollPosition();
                setCurrentView('welcome');
                setSelectedArticle(null);
                setArticleHistory([]);
                setRightSidebarOpen(false);
                setLeftSidebarOpen(false);
                syncUrlForView('welcome', { clearArticle: true });
            };

            const handleAboutClick = () => {
                setCurrentView('about');
                setSelectedArticle(null);
                setRightSidebarOpen(false);
                syncUrlForView('about', { clearArticle: true });
            };

            const handleCoursesClick = () => {
                setCurrentView('courses');
                setSelectedArticle(null);
                setRightSidebarOpen(false);
                syncUrlForView('courses', { clearArticle: true });
            };

            const [testSeriesMode, setTestSeriesMode] = useState(() => {
                const fromUrl = getViewFromUrl();
                return fromUrl?.testSeriesMode || 'online';
            });

            useEffect(() => {
                const applyFromUrl = () => {
                    const parsed = getViewFromUrl();
                    if (!parsed) return;
                    if (parsed.testSeriesMode) setTestSeriesMode(parsed.testSeriesMode);
                    setCurrentView(parsed.view);
                    setRightSidebarOpen(false);
                };
                applyFromUrl();
                window.addEventListener('popstate', applyFromUrl);
                return () => window.removeEventListener('popstate', applyFromUrl);
            }, []);

            useEffect(() => {
                const pageTitles = {
                    welcome: 'Himdrishti | UPSC & HPPSC Test Series, Articles & Current Affairs',
                    articles: 'Articles & Blog | Himdrishti',
                    article: 'Article | Himdrishti',
                    'current-affairs': 'Current Affairs | Himdrishti',
                    'current-affair-detail': 'Current Affairs | Himdrishti',
                    courses: 'Courses | Himdrishti',
                    'test-series': testSeriesMode === 'offline' ? 'OMR BASED (PDF FORMAT) | Himdrishti' : 'COMPUTER BASED (CBT) | Himdrishti',
                    'test-series-detail': testSeriesMode === 'offline' ? 'OMR Test Series | Himdrishti' : 'CBT Test Series | Himdrishti',
                    downloads: 'Downloads | Himdrishti',
                    about: 'About Himdrishti',
                    gsNotes: 'GS Notes | Himdrishti',
                    answerWriting: 'Answer Writing | Himdrishti',
                    pyqs: 'PYQs | Himdrishti',
                    privacy: 'Privacy Policy | Himdrishti',
                    terms: 'Terms of Service | Himdrishti',
                    'refund-policy': 'Refund Policy | Himdrishti',
                    'quiz-attempt': 'Quiz Test | Himdrishti',
                    saves: 'Your Saves | Himdrishti'
                };
                document.title = pageTitles[currentView] || pageTitles.welcome;
            }, [currentView, selectedArticle, selectedTestSeries, testSeriesMode]);

            const handleTestSeriesOnlineClick = () => {
                setTestSeriesMode('online');
                setCurrentView('test-series');
                setSelectedArticle(null);
                setSelectedTestSeries(null);
                setRightSidebarOpen(false);
                syncUrlForView('test-series', { clearArticle: true, testSeriesMode: 'online' });
            };

            const handleTestSeriesOfflineClick = () => {
                setTestSeriesMode('offline');
                setCurrentView('test-series');
                setSelectedArticle(null);
                setSelectedTestSeries(null);
                setRightSidebarOpen(false);
                syncUrlForView('test-series', { clearArticle: true, testSeriesMode: 'offline' });
            };

            const handleTestSeriesClick = () => {
                setCurrentView('test-series');
                setSelectedArticle(null);
                setSelectedTestSeries(null);
                setRightSidebarOpen(false);
                syncUrlForView('test-series', { clearArticle: true, testSeriesMode: testSeriesMode });
            };

            const handleTestSeriesSelect = (ts) => {
                saveScrollPosition();
                if (!ts) {
                    setSelectedTestSeries(null);
                    setCurrentView('test-series');
                    return;
                }

                if (ts.type === 'paid' && !hasActivePurchase(userPurchases, ts.id)) {
                    if (!user) {
                        alert("Please sign in to buy this test series.");
                        handleSignIn();
                        return;
                    }
                    setBuyingItem({ ...ts, itemType: 'test-series' });
                    setIsBuyModalOpen(true);
                    return;
                }

                setSelectedTestSeries(ts);
                setCurrentView('test-series-detail');
                setRightSidebarOpen(false);
            };

            const handleGsNoteSelect = (note) => {
                setSelectedGsNote(note);
                setCurrentView(note ? 'gs-note-detail' : 'gsNotes');
                setRightSidebarOpen(false);
            };

            const handleAnswerWritingSelect = (entry) => {
                setSelectedAnswerWriting(entry);
                setCurrentView(entry ? 'answer-writing-detail' : 'answerWriting');
                setRightSidebarOpen(false);
            };

            const handlePyqSelect = (pyq) => {
                setSelectedPyq(pyq);
                setCurrentView(pyq ? 'pyq-detail' : 'pyqs');
                setRightSidebarOpen(false);
            };

            const handlePayment = (item) => {
                if (!window.Razorpay) return alert("Payment system error. Please refresh.");
                
                const options = {
                    key: "rzp_live_So3pvtH5x3f2Bc",
                    amount: Math.round(parseFloat(item.price) * 100), // Amount in paise, rounded to avoid float issues
                    currency: "INR",
                    name: "Himdrishti",
                    description: `Purchase ${item.title}`,
                    image: "logo.png",
                    handler: async function (response) {
                        if (response.razorpay_payment_id) {
                            try {
                                const { db, collection, addDoc, serverTimestamp } = window.firebaseDB;
                                const validityDuration = item.validityDuration;
                                const validityType = item.validityType || 'months';
                                const expiryDate = item.type === 'paid'
                                    ? computeExpiryDate(validityDuration, validityType)
                                    : null;
                                await addDoc(collection(db, "purchases"), {
                                    userId: user.uid,
                                    userEmail: user.email,
                                    itemId: item.id,
                                    itemType: item.itemType || 'test-series',
                                    paymentId: response.razorpay_payment_id,
                                    amount: item.price,
                                    createdAt: serverTimestamp(),
                                    expiresAt: expiryDate ? expiryDate.toISOString() : null
                                });
                                setIsBuyModalOpen(false);
                                setBuyingItem(null);
                                // The purchase listener will automatically update userPurchases state
                                if (item.itemType === 'current-affair') {
                                    setSelectedCurrentAffair(item);
                                    setCurrentView('current-affair-detail');
                                } else {
                                    setSelectedTestSeries(item);
                                    setCurrentView('test-series-detail');
                                }
                            } catch (err) {
                                console.error(err);
                                alert("Error recording purchase. Please contact support with Payment ID: " + response.razorpay_payment_id);
                            }
                        }
                    },
                    prefill: {
                        name: user?.displayName || "",
                        email: user?.email || ""
                    },
                    theme: {
                        color: "#2563eb"
                    }
                };
                
                const rzp = new window.Razorpay(options);
                rzp.open();
            };

            const handleDownloadsClick = () => {
                setCurrentView('downloads');
                setSelectedArticle(null);
                setRightSidebarOpen(false);
                syncUrlForView('downloads', { clearArticle: true });
            };

            const handlePrivacyClick = () => {
                setCurrentView('privacy');
                setSelectedArticle(null);
                setRightSidebarOpen(false);
                syncUrlForView('privacy', { clearArticle: true });
            };

            const handleTermsClick = () => {
                setCurrentView('terms');
                setSelectedArticle(null);
                setRightSidebarOpen(false);
                syncUrlForView('terms', { clearArticle: true });
            };

            const handleRefundClick = () => {
                setCurrentView('refund-policy');
                setSelectedArticle(null);
                setRightSidebarOpen(false);
                syncUrlForView('refund-policy', { clearArticle: true });
            };

            return (
                <>
                    <Navbar
                        rightSidebarOpen={rightSidebarOpen}
                        setRightSidebarOpen={setRightSidebarOpen}
                        onArticlesClick={handleArticlesClick}
                        onHomeClick={handleHomeClick}
                        onAboutClick={handleAboutClick}
                        onCoursesClick={handleCoursesClick}
                        onTestSeriesOnlineClick={handleTestSeriesOnlineClick}
                        onTestSeriesOfflineClick={handleTestSeriesOfflineClick}
                        onDownloadsClick={handleDownloadsClick}
                        currentView={currentView}
                        user={user}
                        isAdmin={isAdmin}
                        onSignIn={handleSignIn}
                        onSignOut={handleSignOut}
                        onSavesClick={() => setCurrentView('saves')}
                        testSeriesMode={testSeriesMode}
                    />
                    <button className="left-arrow-btn" onClick={() => setLeftSidebarOpen(!leftSidebarOpen)} title="Open Sidebar">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6" /></svg>
                    </button>
                    <div className="main-layout">
                        <LeftSidebar
                            sidebarResources={sidebarResources}
                            sidebarDownloads={sidebarDownloads}
                            testSeries={testSeries}
                            onSeriesSelect={handleTestSeriesSelect}
                            currentView={currentView}
                            selectedTestSeries={selectedTestSeries}
                            userPurchases={userPurchases}
                        />
                        <CenterContent
                            userResults={userResults}
                            onQuizBack={() => setCurrentView(previousView || 'welcome')}
                            onSavesViewResult={(res) => {
                                setPreviousView('saves');
                                setSelectedQuizAttempt({ name: res.quizName, title: res.quizName, savedResult: res, questions: res.questions || [] });
                                setCurrentView('quiz-attempt');
                            }}
                            onAttemptQuiz={handleAttemptQuiz}
                            selectedQuiz={selectedQuizAttempt}
                            key={currentView + (selectedArticle?.id || '') + (selectedTestSeries?.id || '') + (selectedCurrentAffair?.id || '') + (selectedGsNote?.id || '') + (selectedAnswerWriting?.id || '') + (selectedPyq?.id || '') + filteredCategory + caFilter}
                            currentView={currentView}
                            selectedArticle={selectedArticle}
                            selectedTestSeries={selectedTestSeries}
                            onArticleSelect={handleArticleSelect}
                            onArticleBack={handleArticleBack}
                            onSeriesSelect={handleTestSeriesSelect}
                            onViewAllClick={handleArticlesClick}
                            onAboutClick={handleAboutClick}
                            onCategoryClick={handleCategoryClick}
                            onHomeClick={handleHomeClick}
                            onTestSeriesClick={handleTestSeriesClick}
                            onTestSeriesOnlineClick={handleTestSeriesOnlineClick}
                            onTestSeriesOfflineClick={handleTestSeriesOfflineClick}
                            onCurrentAffairsClick={handleCurrentAffairsClick}
                            onCoursesClick={handleCoursesClick}
                            onPrivacyClick={handlePrivacyClick}
                            onTermsClick={handleTermsClick}
                            onRefundClick={handleRefundClick}
                            onCurrentAffairSelect={handleCurrentAffairSelect}
                            articles={filteredCategory ? articles.filter(a => a.category === filteredCategory) : articles}
                            filteredCategory={filteredCategory}
                            downloads={downloads}
                            testSeries={testSeries}
                            categories={categories}
                            downloadCategories={downloadCategories}
                            user={user}
                            onSignIn={handleSignIn}
                            currentAffairs={currentAffairs}
                            currentAffairCategories={currentAffairCategories}
                            caFilter={caFilter}
                            setCaFilter={setCaFilter}
                            selectedCurrentAffair={selectedCurrentAffair}
                            setSelectedCurrentAffair={setSelectedCurrentAffair}
                            gsNotes={gsNotes}
                            answerWriting={answerWriting}
                            pyqs={pyqs}
                            onGsNoteSelect={handleGsNoteSelect}
                            onAnswerWritingSelect={handleAnswerWritingSelect}
                            onPyqSelect={handlePyqSelect}
                            selectedGsNote={selectedGsNote}
                            selectedAnswerWriting={selectedAnswerWriting}
                            testSeriesMode={testSeriesMode}
                            selectedPyq={selectedPyq}
                            userPurchases={userPurchases}
                        />
                        <RightSidebar onArticleSelect={handleArticleSelect} onViewAllClick={handleArticlesClick} articles={articles} />
                    </div>
                    {isBuyModalOpen && (
                        <BuyModal 
                            item={buyingItem} 
                            user={user} 
                            onClose={() => { setIsBuyModalOpen(false); setBuyingItem(null); }} 
                            onPay={handlePayment} 
                        />
                    )}
                    <div className={`sidebar-overlay-backdrop ${rightSidebarOpen ? 'open' : ''}`} onClick={() => setRightSidebarOpen(false)}></div>
                    <div className={`sidebar-right-overlay ${rightSidebarOpen ? 'open' : ''}`}>
                        <RightSidebarContent onArticleSelect={handleArticleSelect} onViewAllClick={handleArticlesClick} articles={articles} />
                    </div>
                    <div className={`sidebar-left-backdrop ${leftSidebarOpen ? 'open' : ''}`} onClick={() => setLeftSidebarOpen(false)}></div>
                    <div className={`sidebar-left-overlay ${leftSidebarOpen ? 'open' : ''}`}>
                        <LeftSidebarContent
                            sidebarResources={sidebarResources}
                            sidebarDownloads={sidebarDownloads}
                            testSeries={testSeries}
                            onSeriesSelect={handleTestSeriesSelect}
                            currentView={currentView}
                            selectedTestSeries={selectedTestSeries}
                            userPurchases={userPurchases}
                        />
                    </div>
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
