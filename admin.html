    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius-lg: 24px;
            --radius-md: 16px;
            --shadow-premium: 0 20px 50px -12px rgba(0, 0, 0, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
        }

        #root {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Navbar */
        .admin-navbar {
            height: 80px;
            background: #ffffff;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .admin-brand {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -1.5px;
        }

        .blink-label {
            font-size: 11px;
            font-weight: 800;
            color: #ef4444;
            background: rgba(239, 68, 68, 0.05);
            padding: 6px 14px;
            border-radius: 30px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: pulse 2s infinite;
            border: 1px solid rgba(239, 68, 68, 0.1);
        }

        .blink-dot {
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            box-shadow: 0 0 10px #ef4444;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.6;
                transform: scale(0.95);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Layout */
        .admin-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .admin-sidebar {
            width: 300px;
            background: #ffffff;
            border-right: 1px solid var(--border);
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
        }

        .admin-sidebar::-webkit-scrollbar {
            width: 4px;
        }

        .admin-sidebar::-webkit-scrollbar-track {
            background: transparent;
        }

        .admin-sidebar::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }

        .admin-sidebar::-webkit-scrollbar-thumb:hover {
            background: #cbd5e1;
        }

        .sidebar-section-title {
            font-size: 12px;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 20px 0 16px 20px;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 22px;
            color: var(--text-muted);
            font-size: 16px;
            font-weight: 600;
            border-radius: 18px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
        }

        .sidebar-item:hover {
            background: #f1f5f9;
            color: var(--primary);
        }

        .sidebar-item.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.3);
        }

        .admin-main {
            flex: 1;
            padding: 50px;
            overflow-y: auto;
            background: var(--bg);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 45px;
        }

        .page-title {
            font-size: 36px;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -1px;
        }

        .admin-btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s;
            box-shadow: 0 8px 15px rgba(37, 99, 235, 0.2);
        }

        .admin-btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(37, 99, 235, 0.35);
        }

        /* --- REDESIGNED POPUPS --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 30px;
        }

        .modal-content {
            background: #ffffff;
            width: 100%;
            max-width: 800px;
            max-height: 92vh;
            padding: 50px;
            border-radius: 36px;
            box-shadow: var(--shadow-premium);
            overflow-y: auto;
            position: relative;
            animation: modalSpring 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @keyframes modalSpring {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(30px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-close-btn {
            position: absolute;
            top: 35px;
            right: 35px;
            width: 44px;
            height: 44px;
            border-radius: 15px;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #64748b;
            border: none;
            transition: all 0.3s ease;
        }

        .modal-close-btn:hover {
            background: #fee2e2;
            color: #ef4444;
            transform: rotate(90deg);
        }

        .modal-header {
            margin-bottom: 40px;
        }

        .modal-title {
            font-size: 32px;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 12px;
            letter-spacing: -1px;
        }

        .modal-desc {
            font-size: 16px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .form-card {
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 35px;
        }

        .form-section-head {
            font-size: 14px;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .form-section-head::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .field-group {
            margin-bottom: 28px;
        }

        .field-label {
            display: block;
            font-size: 15px;
            font-weight: 700;
            color: #334155;
            margin-bottom: 12px;
        }

        .premium-input,
        .premium-select {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 18px;
            font-family: inherit;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
            background: #ffffff;
            color: var(--text-main);
        }

        .premium-input:focus,
        .premium-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 5px rgba(37, 99, 235, 0.1);
            transform: translateY(-1px);
        }

        .premium-input::placeholder {
            color: #cbd5e1;
        }

        .content-block {
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 25px;
            margin-bottom: 25px;
            transition: all 0.3s;
        }

        .content-block:focus-within {
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
        }

        .block-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }

        .block-tag {
            font-size: 12px;
            font-weight: 800;
            color: var(--primary);
            background: #eff6ff;
            padding: 5px 14px;
            border-radius: 10px;
            text-transform: uppercase;
        }

        .rich-editor {
            min-height: 150px;
            padding: 20px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            outline: none;
            font-size: 16px;
            line-height: 1.8;
            color: #334155;
            transition: all 0.3s;
        }

        .rich-editor:focus {
            background: #ffffff;
            border-color: var(--primary);
        }

        .quiz-rich-input {
            min-height: 48px;
            padding: 10px 12px;
            font-size: 14px;
            line-height: 1.5;
            border-radius: 10px;
        }

        .quiz-rich-input:empty:before {
            content: attr(data-placeholder);
            color: #94a3b8;
            pointer-events: none;
        }

        .list-table-cell-editor {
            min-height: 40px;
            padding: 8px 10px;
            font-size: 13px;
            line-height: 1.45;
            border-radius: 0;
            border: none;
            background: transparent;
        }

        .list-table-cell-editor:focus {
            background: #ffffff;
            box-shadow: inset 0 0 0 2px #0d9488;
        }

        .list-table-cell-editor:empty:before {
            content: attr(data-placeholder);
            color: #94a3b8;
            pointer-events: none;
        }

        .list-table-editor-wrap .quiz-question-toolbar-inner {
            max-width: 100%;
        }

        .quiz-question-card {
            background: #f8fafc;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .quiz-question-card.selected {
            border: 2px solid #047857;
            box-shadow: 0 8px 24px rgba(4, 120, 87, 0.12);
            cursor: default;
        }

        .quiz-question-card:not(.selected):hover {
            border-color: #6ee7b7;
            background: #f0fdf4;
        }

        .quiz-question-edit-hint {
            font-size: 11px;
            color: #059669;
            font-weight: 600;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .quiz-question-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 15px;
            cursor: pointer;
            background: #ffffff;
            border-bottom: 1px solid transparent;
        }

        .quiz-question-card.selected .quiz-question-header {
            border-bottom-color: #e2e8f0;
            background: #ecfdf5;
        }

        .quiz-question-editor-area {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .quiz-question-toolbar {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-bottom: 4px;
        }

        .quiz-question-toolbar-inner {
            background: #0f172a;
            padding: 10px 12px;
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: fit-content;
            max-width: 100%;
        }

        .quiz-inline-math-panel {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 340px;
        }

        .quiz-inline-math-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .quiz-inline-math-title {
            font-size: 11px;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .quiz-inline-math-close {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            color: #e2e8f0;
            width: 24px;
            height: 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            line-height: 1;
        }

        .tool-btn-math.active {
            box-shadow: 0 0 0 2px #7c3aed;
            opacity: 1;
        }

        .add-block-trigger {
            background: transparent;
            color: var(--text-muted);
            border: 2px dashed #cbd5e1;
            padding: 24px;
            border-radius: 22px;
            width: 100%;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 45px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 16px;
        }

        .add-block-trigger:hover {
            background: #eff6ff;
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
        }

        .modal-actions-footer {
            display: flex;
            gap: 20px;
            border-top: 1px solid var(--border);
            padding-top: 40px;
            margin-top: 20px;
        }

        .action-button {
            flex: 1;
            padding: 18px;
            border-radius: 20px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            font-size: 17px;
            transition: all 0.3s;
        }

        .btn-secondary {
            background: #f1f5f9;
            color: #64748b;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
            color: var(--text-main);
        }

        .btn-primary-action {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }

        .btn-primary-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(37, 99, 235, 0.3);
        }


        /* Math Symbols Popup */
        .math-popup {
            position: absolute;
            background: #0f172a;
            border-radius: 16px;
            padding: 16px;
            z-index: 9999;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            width: 360px;
            max-height: 420px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .math-popup::-webkit-scrollbar { width: 4px; }
        .math-popup::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .math-category-title {
            font-size: 10px;
            font-weight: 800;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 12px 0 6px 0;
        }
        .math-category-title:first-child { margin-top: 0; }
        .math-symbols-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 4px;
        }
        .math-sym-btn {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #e2e8f0;
            font-size: 15px;
            padding: 6px 4px;
            cursor: pointer;
            text-align: center;
            transition: all 0.15s;
            line-height: 1;
        }
        .math-sym-btn:hover {
            background: #2563eb;
            border-color: #3b82f6;
            color: white;
            transform: scale(1.15);
        }
        .tool-btn-math {
            background: linear-gradient(135deg, #7c3aed, #2563eb);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 11px;
            font-weight: 800;
            padding: 5px 9px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.5px;
        }
        .tool-btn-math:hover { opacity: 0.85; transform: scale(1.05); }
        .math-input-row {
            display: flex;
            gap: 6px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #1e293b;
        }
        .math-latex-input {
            flex: 1;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            padding: 7px 10px;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            outline: none;
        }
        .math-latex-input::placeholder { color: #475569; }
        .math-insert-btn {
            background: #7c3aed;
            border: none;
            border-radius: 8px;
            color: white;
            padding: 7px 14px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const PERMANENT_ADMIN_EMAIL = 'himdrishti.adm@gmail.com';

        const Icons = {
            Articles: () => <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="22" height="22"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 20H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h10l4 4v10a2 2 0 0 1-2 2z"></path><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" /></svg>,

            Plus: () => <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="20" height="20"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 6v12m6-6H6"></path></svg>,
            Trash: () => <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>,
            Bold: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path></svg>,

            X: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>,
            ChevronDown: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>,
            Edit: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>,
            Download: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></svg>,
            News: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 20H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h10l4 4v10a2 2 0 0 1-2 2z"></path><path d="M16 13H8M16 17H8M10 9H8"></path></svg>,
            Link: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>,
            User: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>,
            Eye: (props) => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>,
            Heart: (props) => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
        };

        function ContentStats({ views = 0, interest = 0 }) {
            const pillStyle = (color, bg) => ({
                fontSize: '12px', color, display: 'flex', alignItems: 'center', gap: '4px',
                background: bg, padding: '4px 10px', borderRadius: '20px', fontWeight: 'bold', whiteSpace: 'nowrap'
            });
            return (
                <span style={{ display: 'flex', alignItems: 'center', gap: '6px', flexShrink: 0 }}>
                    <span style={pillStyle('#6366f1', '#e0e7ff')} title="Views">
                        <Icons.Eye style={{ width: '14px', height: '14px' }} /> {views || 0}
                    </span>
                    <span style={pillStyle('#be185d', '#fce7f3')} title="Interested users (10+ sec)">
                        <Icons.Heart style={{ width: '14px', height: '14px' }} /> {interest || 0}
                    </span>
                </span>
            );
        }

        const TEN_COLORS = ['#000000', '#64748b', '#2563eb', '#ef4444', '#10b981', '#14b8a6', '#f59e0b', '#f97316', '#8b5cf6', '#ec4899'];

        function ParagraphInput({ initialValue, index, onChange, onRemove }) {
            const inputRef = useRef(null);
            useEffect(() => { if (inputRef.current) inputRef.current.innerHTML = initialValue || ''; }, [initialValue]);
            return (
                <div className="content-block">
                    <div className="block-header">
                        <span className="block-tag">Section {index + 1}</span>
                        <button className="modal-close-btn" style={{ width: '32px', height: '32px', position: 'static' }} onClick={onRemove}><Icons.X /></button>
                    </div>
                    <div ref={inputRef} contentEditable className="rich-editor" onBlur={() => onChange(inputRef.current.innerHTML)} suppressContentEditableWarning={true} />
                </div>
            );
        }

        const stripHtml = (html) => {
            if (!html) return '';
            const d = document.createElement('div');
            d.innerHTML = html;
            return (d.textContent || d.innerText || '').trim();
        };

        function createEmptyListTableCells(rows, cols) {
            return Array.from({ length: rows }, () => Array.from({ length: cols }, () => ''));
        }

        function getListTableCells(item) {
            if (item.cellRows && Array.isArray(item.cellRows)) {
                return item.cellRows.map(r => (Array.isArray(r.cells) ? [...r.cells] : []));
            }
            if (item.cells && Array.isArray(item.cells)) {
                return item.cells.map(row => (Array.isArray(row) ? [...row] : []));
            }
            return createEmptyListTableCells(item.rows || 1, item.cols || 1);
        }

        function buildListTableBlock(rows, cols, cells) {
            return {
                type: 'list_table',
                rows,
                cols,
                cellRows: cells.map(row => ({ cells: [...row] }))
            };
        }

        function serializeArticleContentForSave(content) {
            return (content || []).map(item => {
                if (item?.type !== 'list_table') return item;
                const cells = getListTableCells(item);
                const rows = item.rows || cells.length || 1;
                const cols = item.cols || (cells[0]?.length || 1);
                return buildListTableBlock(rows, cols, cells);
            });
        }

        function getContentBlockColor(type) {
            const map = { paragraph: '#3b82f6', image: '#10b981', video: '#f59e0b', quiz: '#6b21a8', quiz_test: '#047857', download: '#ef4444', list_table: '#0d9488' };
            return map[type] || '#64748b';
        }

        function getContentBlockLabel(type) {
            if (type === 'quiz_test') return 'Quiz Test';
            if (type === 'list_table') return 'List Table';
            return `${type} Block`;
        }

        function ListTableEditor({ item, blockIndex, articleData, setArticleData }) {
            const [activeCell, setActiveCell] = useState(null);
            const [tableMathOpen, setTableMathOpen] = useState(false);
            const [tableMathInput, setTableMathInput] = useState('');
            const tableSavedRange = useRef(null);
            const cells = getListTableCells(item);
            const updateCell = (r, c, value) => {
                const n = [...(articleData.content || [])];
                const newCells = cells.map((row, ri) => row.map((cell, ci) => (ri === r && ci === c ? value : cell)));

        function QuizRichInput({ value, onChange, placeholder, minHeight = '48px', onActivate, editorClass = 'quiz-rich-input' }) {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && document.activeElement !== ref.current) {
                    const v = value || '';
                    if (ref.current.innerHTML !== v) ref.current.innerHTML = v;
                }
            }, [value]);
            return (
                <div
                    ref={ref}
                    contentEditable
                    className={`rich-editor ${editorClass}`}
                    style={{ minHeight }}
                    data-placeholder={placeholder}
                    onFocus={onActivate}
                    onMouseUp={onActivate}
                    onBlur={() => onChange(ref.current?.innerHTML || '')}
                    suppressContentEditableWarning={true}
                />
            );
        }

        function QuizQuestionToolbar({ mathOpen, setMathOpen, savedRangeRef, mathInput, setMathInput }) {
            const saveSelection = () => {
                if (window.getSelection().rangeCount > 0) {
                    savedRangeRef.current = window.getSelection().getRangeAt(0).cloneRange();
                }
            };
            const insertAtRange = (node) => {
                const range = savedRangeRef.current;
                if (range) {
                    range.deleteContents();
                    range.insertNode(node);
                    range.collapse(false);
                    const sel = window.getSelection();
                    sel.removeAllRanges();
                    sel.addRange(range);
                } else {
                    document.execCommand('insertText', false, node.textContent || '');
                }
            };
            const mathCategories = [
                { title: 'Greek Letters', symbols: ['α','β','γ','δ','ε','ζ','η','θ','ι','κ','λ','μ','ν','ξ','π','ρ','σ','τ','υ','φ','χ','ψ','ω','Α','Β','Γ','Δ','Σ','Ω'] },
                { title: 'Operators', symbols: ['±','×','÷','≠','≈','≡','∝','∞','∑','∏','√','∛','∂','∇','∫','∮'] },
                { title: 'Relations', symbols: ['≤','≥','≪','≫','⊂','⊃','⊆','⊇','∈','∉','∩','∪'] },
                { title: 'Fractions', symbols: ['½','⅓','¼','¾','⅔','⅛','⅜','⅝','⅞'] },
                { title: 'Arrows', symbols: ['→','←','↑','↓','↔','⇒','⇐','⇔'] },
                { title: 'Misc', symbols: ['°','′','″','‰','∀','∃','∅','⊕','∠','△'] },
            ];
            return (
                <div className="quiz-question-toolbar">
                    <div className="quiz-question-toolbar-inner">
                        <div className="style-row" style={{ borderBottom: 'none', paddingBottom: 0, marginBottom: 0, flexWrap: 'wrap', justifyContent: 'center' }}>
                            <button type="button" className="tool-btn" onMouseDown={e => { e.preventDefault(); saveSelection(); document.execCommand('bold'); }}><Icons.Bold /></button>
                            <button type="button" className="tool-btn" onMouseDown={e => { e.preventDefault(); saveSelection(); document.execCommand('italic'); }}><Icons.Italic /></button>
                            <button type="button" className="tool-btn" onMouseDown={e => { e.preventDefault(); saveSelection(); document.execCommand('superscript'); }} title="Superscript"><sup style={{ fontSize: '10px', fontWeight: '900' }}>A²</sup></button>
                            <button type="button" className="tool-btn" onMouseDown={e => { e.preventDefault(); saveSelection(); document.execCommand('subscript'); }} title="Subscript"><sub style={{ fontSize: '10px', fontWeight: '900' }}>A₂</sub></button>
                            <button type="button" className={`tool-btn-math ${mathOpen ? 'active' : ''}`} onMouseDown={e => { e.preventDefault(); saveSelection(); setMathOpen(!mathOpen); }} title="Math Symbols (toggle)">∑π</button>
                            <button type="button" className="tool-btn-text" onMouseDown={e => { e.preventDefault(); document.execCommand('removeFormat'); }}>RESET</button>
                        </div>
                        <div className="color-grid" style={{ marginTop: '10px' }}>{TEN_COLORS.map(c => (<div key={c} className="color-circle" style={{ background: c, width: '24px', height: '24px' }} onMouseDown={e => { e.preventDefault(); saveSelection(); document.execCommand('foreColor', false, c); }}></div>))}</div>
                        {mathOpen && (
                            <div className="quiz-inline-math-panel">

                                </div>
                                {mathCategories.map(cat => (
                                    <div key={cat.title} style={{ marginBottom: '8px' }}>
                                        <div className="math-category-title">{cat.title}</div>
                                        <div className="math-symbols-grid">
                                            {cat.symbols.map(sym => (

                                            ))}
                                        </div>
                                    </div>

                                        <div key={cat.id} className="card-item" style={{ padding: '15px 25px' }}>
                                            <div className="item-details">
                                                <div className="item-heading" style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between', paddingRight: '10px'}}><span>{cat.name}</span><ContentStats views={cat.views} interest={cat.interest} /></div>
                                            </div>
                                            <button className="btn-action-circle btn-del" onClick={async () => { if (confirm("Delete category?")) await window.firebaseDB.deleteDoc(window.firebaseDB.doc(window.firebaseDB.db, "currentAffairCategories", cat.id)); }}><Icons.Trash /></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {toolbar.show && (
                        <div className="style-toolbar" style={{ left: toolbar.x, top: toolbar.y, transform: 'translateX(-50%)', display: 'flex', flexDirection: 'column', gap: '8px' }}>
                            <div className="style-row">
                                <button className="tool-btn" onMouseDown={e => { e.preventDefault(); document.execCommand('bold'); }}><Icons.Bold /></button>
                                <button className="tool-btn" onMouseDown={e => { e.preventDefault(); document.execCommand('italic'); }}><Icons.Italic /></button>
                                <button className="tool-btn" onMouseDown={e => { e.preventDefault(); document.execCommand('superscript'); }} title="Superscript (x²)"><sup style={{fontSize:'10px',fontWeight:'900'}}>A²</sup></button>
                                <button className="tool-btn" onMouseDown={e => { e.preventDefault(); document.execCommand('subscript'); }} title="Subscript (H₂O)"><sub style={{fontSize:'10px',fontWeight:'900'}}>A₂</sub></button>
<button className={`tool-btn ${showLinkMenu ? 'active' : ''}`} onMouseDown={e => { e.preventDefault(); setShowLinkMenu(!showLinkMenu); setShowMathPopup(false); }} style={{ color: showLinkMenu ? '#2563eb' : 'inherit' }}><Icons.Link /></button>
                                <button className="tool-btn-math" onMouseDown={e => { e.preventDefault(); savedRange.current = window.getSelection().rangeCount > 0 ? window.getSelection().getRangeAt(0).cloneRange() : null; setShowMathPopup(!showMathPopup); setShowLinkMenu(false); }} title="Math Symbols">∑π</button>
                                <button className="tool-btn-text" onMouseDown={e => { e.preventDefault(); document.execCommand('removeFormat'); }}>RESET</button>
                            </div>
                            <div className="color-grid">{TEN_COLORS.map(c => (<div key={c} className="color-circle" style={{ background: c }} onMouseDown={e => { e.preventDefault(); document.execCommand('foreColor', false, c); }}></div>))}</div>
                            
                            {showLinkMenu && (
                                <div className="link-article-menu" onMouseDown={e => e.preventDefault()} style={{ padding: '12px', background: '#f8fafc', borderTop: '1px solid #e2e8f0', borderRadius: '0 0 12px 12px', width: '320px' }}>
                                    <div style={{ display: 'flex', gap: '6px', marginBottom: '10px' }}>
                                        {['articles', 'currentAffairs', 'answerWriting', 'testSeries'].map(type => (
                                            <button 
                                                key={type}
                                                onClick={() => setLinkType(type)}
                                                style={{ 
                                                    flex: 1,
                                                    fontSize: '10px', 
                                                    padding: '6px 4px', 
                                                    borderRadius: '6px', 
                                                    border: 'none', 
                                                    cursor: 'pointer',
                                                    background: linkType === type ? '#2563eb' : '#e2e8f0',
                                                    color: linkType === type ? 'white' : '#64748b',
                                                    fontWeight: '700',
                                                    textTransform: 'uppercase',
                                                    whiteSpace: 'nowrap',
                                                    textAlign: 'center'
                                                }}
                                            >
                                                {type === 'currentAffairs' ? 'Cur Affairs' : type === 'answerWriting' ? 'Ans Write' : type === 'testSeries' ? 'Tst Series' : 'Articles'}
                                            </button>
                                        ))}
                                    </div>
                                    <input 
                                        type="text" 
                                        className="premium-input" 
                                        placeholder={`Search ${linkType}...`} 
                                        value={articleSearch}
                                        onChange={e => setArticleSearch(e.target.value)}
                                        style={{ fontSize: '11px', padding: '8px', marginBottom: '8px' }}
                                    />
                                    <div className="article-mini-list" style={{ maxHeight: '150px', overflowY: 'auto', display: 'flex', flexDirection: 'column', gap: '4px' }}>
                                        {(() => {
                                            const list = linkType === 'articles' ? articles : 
                                                         linkType === 'currentAffairs' ? currentAffairs : 
                                                         linkType === 'answerWriting' ? answerWriting : 
                                                         testSeries;
                                            
                                            return list.filter(item => {
                                                const title = item.heading || item.title || '';
                                                return title.toLowerCase().includes(articleSearch.toLowerCase());
                                            }).slice(0, 10).map(item => (
                                                <div 
                                                    key={item.id} 
                                                    className="mini-article-item" 
                                                    onClick={() => {
                                                        const selection = window.getSelection();
                                                        if (selection.rangeCount > 0) {
                                                            const range = selection.getRangeAt(0);
                                                            const text = selection.toString();
                                                            const link = document.createElement('a');
                                                            link.href = '#';
                                                            link.className = 'article-link';
                                                            link.style.color = '#2563eb';
                                                            link.style.fontWeight = '700';
                                                            link.style.textDecoration = 'underline';
                                                            
                                                            // Map internal names to website types
                                                            const webType = linkType === 'currentAffairs' ? 'current-affair' : 
                                                                           linkType === 'answerWriting' ? 'answer-writing' : 
                                                                           linkType === 'testSeries' ? 'test-series' : 'article';
                                                            
                                                            link.dataset.type = webType;
                                                            link.dataset.id = item.id;
                                                            link.textContent = text || (item.heading || item.title);
                                                            
                                                            range.deleteContents();
                                                            range.insertNode(link);
                                                            
                                                            // Close toolbar
                                                            setToolbar({ show: false, x: 0, y: 0 });
                                                            setShowLinkMenu(false);
                                                            setArticleSearch('');
                                                        }
                                                    }}
                                                    style={{ padding: '8px 10px', fontSize: '11px', background: 'white', border: '1px solid #e2e8f0', borderRadius: '6px', cursor: 'pointer', lineHeight: '1.4' }}

                                                >
                                                    {item.heading || item.title}
                                                </div>
                                            ));
                                        })()}
                                    </div>
                                </div>
                            )}
                            {showMathPopup && (
                                <div className="math-popup" onMouseDown={e => e.preventDefault()}>
                                    <div className="quiz-inline-math-header" style={{ marginBottom: '12px' }}>
                                        <span className="quiz-inline-math-title" style={{ color: '#94a3b8' }}>Math Symbols</span>
                                        <button type="button" className="quiz-inline-math-close" onMouseDown={e => { e.preventDefault(); setShowMathPopup(false); }}>×</button>
                                    </div>
                                    {[
                                        { title: 'Greek Letters', symbols: ['α','β','γ','δ','ε','ζ','η','θ','ι','κ','λ','μ','ν','ξ','π','ρ','σ','τ','υ','φ','χ','ψ','ω','Α','Β','Γ','Δ','Σ','Ω'] },
                                        { title: 'Operators', symbols: ['±','×','÷','≠','≈','≡','∝','∞','∑','∏','√','∛','∂','∇','∫','∮'] },
                                        { title: 'Relations', symbols: ['≤','≥','≪','≫','⊂','⊃','⊆','⊇','∈','∉','∩','∪'] },
                                        { title: 'Fractions & Powers', symbols: ['½','⅓','¼','¾','⅔','⅛','⅜','⅝','⅞'] },
                                        { title: 'Arrows', symbols: ['→','←','↑','↓','↔','⇒','⇐','⇔','⇑','⇓'] },
                                        { title: 'Misc', symbols: ['°','′','″','‰','∀','∃','∄','∅','⊕','⊗','⊥','∠','△','▽'] },
                                    ].map(cat => (
                                        <div key={cat.title}>
                                            <div className="math-category-title">{cat.title}</div>
                                            <div className="math-symbols-grid">
                                                {cat.symbols.map(sym => (
                                                    <button key={sym} className="math-sym-btn" onClick={() => {
                                                        const range = savedRange.current;
                                                        if (range) {
                                                            range.deleteContents();
                                                            range.insertNode(document.createTextNode(sym));
                                                            range.collapse(false);
                                                            const sel = window.getSelection();
                                                            sel.removeAllRanges();
                                                            sel.addRange(range);
                                                        } else {
                                                            document.execCommand('insertText', false, sym);
                                                        }
                                                    }} title={sym}>{sym}</button>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                    <div className="math-input-row">
                                        <input
                                            className="math-latex-input"
                                            placeholder="Type LaTeX: e.g. \frac{1}{2} or x^2"
                                            value={mathLatexInput}
                                            onChange={e => setMathLatexInput(e.target.value)}
                                        />
                                        <button className="math-insert-btn" onClick={() => {
                                            if (!mathLatexInput.trim()) return;
                                            const span = document.createElement('span');
                                            span.innerHTML = '$' + mathLatexInput + '$';
                                            span.className = 'math-inline';
                                            const range = savedRange.current;
                                            if (range) {
                                                range.deleteContents();
                                                range.insertNode(span);
                                            }
                                            if (window.renderMathInElement) {
                                                window.renderMathInElement(span, { delimiters: [{left:'$',right:'$',display:false}] });
                                            }
                                            setMathLatexInput('');
                                        }}>Insert</button>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </React.Fragment>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdminPanel />);
    </script>
</body>

</html>
